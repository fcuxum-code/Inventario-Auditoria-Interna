    background:var(--fondo); color:#1a1f26; font-size:16px; line-height:1.4;
    padding-bottom:84px; -webkit-text-size-adjust:100%;}
  header{position:sticky; top:0; z-index:50; background:var(--azul); color:#fff;
    padding:10px 12px 8px; box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .hrow{display:flex; align-items:center; gap:10px;}
  .htitle{font-size:15px; font-weight:700; flex:1; line-height:1.15;}
  .htitle small{display:block; font-weight:400; font-size:11px; opacity:.8;}
  .hbtn{background:rgba(255,255,255,.16); border:none; color:#fff; font-size:19px;
    width:40px; height:40px; border-radius:9px; flex:none; position:relative;}
  .hbtn .dot{position:absolute; top:5px; right:5px; width:9px; height:9px; border-radius:50%;
    background:#FFB84D; border:1.5px solid var(--azul); display:none;}
  .hbtn .dot.on{display:block;}
  .pbarwrap{margin-top:8px; background:rgba(255,255,255,.18); border-radius:20px; height:20px; position:relative; overflow:hidden;}
  .pbar{background:linear-gradient(90deg,#3ea346,#57c95f); height:100%; width:0%; transition:width .3s; border-radius:20px;}
  .pbartxt{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:11.5px; font-weight:700; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .searchbar{padding:10px 12px 4px;}
  .searchbar input{width:100%; padding:12px 14px; border:1.5px solid var(--linea); border-radius:11px;
    font-size:16px; background:#fff; outline:none;}
  .searchbar input:focus{border-color:var(--azul2);}
  .backbtn{display:inline-flex; align-items:center; gap:6px; background:#fff; border:1.5px solid var(--linea);
    color:var(--azul); font-weight:600; font-size:14px; padding:9px 14px; border-radius:10px; margin:8px 0 2px;}
  .wrap{padding:6px 12px 0;}
  .hint{font-size:12.5px; color:var(--gris); margin:4px 2px 8px;}
  /* fila de responsables */
  .prow{background:var(--card); border:1px solid var(--linea); border-radius:12px; padding:12px 13px;
    margin-bottom:9px; display:flex; align-items:center; gap:11px; box-shadow:0 1px 2px rgba(20,30,60,.04);}
  .prow:active{background:#f6f8fc;}
  .pinfo{flex:1; min-width:0;}
  .pname{font-weight:700; font-size:15px; color:#17202e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pmeta{font-size:11.5px; color:var(--gris2); margin-top:2px;}
  .ring{--p:0; flex:none; width:46px; height:46px; border-radius:50%;
    background:conic-gradient(var(--verde) calc(var(--p)*1%), #E7ECF3 0);
    display:flex; align-items:center; justify-content:center; position:relative;}
  .ring::before{content:""; position:absolute; inset:5px; background:#fff; border-radius:50%;}
  .ringtxt{position:relative; font-size:10.5px; font-weight:800; color:var(--azul);}
  .chip{display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px;
    letter-spacing:.2px; vertical-align:middle;}
  .c-comp{background:#E7ECF6; color:#2F5496;}
  .c-bod{background:#EAE3F3; color:#6B3FA0;}
  .c-ind{background:#E9EDF2; color:#516074;}
  .c-dup{background:var(--naranjabg); color:var(--naranja); margin-left:5px;}
  .c-rev{background:var(--amarbg); color:var(--amar); margin-left:5px;}
  .c-hz{background:var(--naranjabg); color:var(--naranja);}
  /* fila especial hallazgos en home */
  .hzrow{background:linear-gradient(135deg,#FDF0E3,#FCEBDA); border:1.5px solid var(--naranjab);
    border-radius:12px; padding:13px; margin-bottom:11px; display:flex; align-items:center; gap:11px;}
  .hzrow .ic{font-size:24px; flex:none;}
  .hzrow b{color:#7A4508; font-size:14.5px;}
  .hzrow small{display:block; color:#9A6A33; font-size:11.5px; margin-top:1px;}
  /* tarjeta de bien */
  .item{background:var(--card); border:1px solid var(--linea); border-left:5px solid var(--linea);
    border-radius:12px; padding:12px 13px 13px; margin-bottom:11px; box-shadow:0 1px 3px rgba(20,30,60,.05);}
  .item.done-si{border-left-color:var(--verde);}
  .item.done-no{border-left-color:var(--rojo);}
  .item.done-nu{border-left-color:var(--naranja);}
  .item.hzitem{border-left-color:var(--naranja); background:#FFFDF9;}
  .itop{display:flex; align-items:baseline; gap:8px;}
  .inv{font-size:18px; font-weight:800; color:#141a24; letter-spacing:.3px;}
  .val{margin-left:auto; font-size:13px; font-weight:700; color:var(--teal); white-space:nowrap;}
  .desc{font-size:13.5px; color:#2c333d; margin:6px 0 2px;}
  .ochips{margin:5px 0 2px;}
  .powner{font-size:11.5px; color:var(--gris2); margin-top:3px;}
  .bgrp{display:flex; gap:7px; margin-top:10px;}
  .bgrp.estado{margin-top:7px;}
  .btn{flex:1; border:1.6px solid var(--linea); background:#fff; color:#333; font-size:14px; font-weight:700;
    padding:12px 4px; border-radius:10px; text-align:center; line-height:1.15; transition:.12s;}
  .btn:active{transform:scale(.97);}
  .btn small{display:block; font-size:10px; font-weight:600; opacity:.7;}
  .btn.est{font-size:12.5px; padding:10px 3px;}
  .b-si.sel{background:var(--verde); border-color:var(--verde); color:#fff;}
  .b-no.sel{background:var(--rojo); border-color:var(--rojo); color:#fff;}
  .b-nu.sel{background:var(--naranja); border-color:var(--naranja); color:#fff;}
  .e-bueno.sel{background:var(--verde); border-color:var(--verde); color:#fff;}
  .e-regular.sel{background:#B08900; border-color:#B08900; color:#fff;}
  .e-malo.sel{background:var(--naranja); border-color:var(--naranja); color:#fff;}
  .e-baja.sel{background:var(--rojo); border-color:var(--rojo); color:#fff;}
  /* fila foto + extra */
  .tools{display:flex; gap:8px; align-items:center; margin-top:9px; flex-wrap:wrap;}
  .moretog{font-size:12.5px; color:var(--azul2); font-weight:600;}
  .fotobtn{border:1.6px dashed #B8C4D4; background:#F7FAFE; color:var(--azul2); font-size:12.5px; font-weight:700;
    padding:8px 12px; border-radius:9px;}
  .fotobtn.has{border-style:solid; background:var(--verdebg); border-color:var(--verdeb); color:var(--verde);}
  .thumb{width:44px; height:44px; border-radius:8px; object-fit:cover; border:1.5px solid var(--linea);}
  .extra{display:none; margin-top:9px;}
  .extra.open{display:block;}
  .extra label,.fform label{font-size:11px; color:var(--gris); font-weight:600; display:block; margin:8px 0 3px;}
  .extra input,.fform input,.fform select{width:100%; padding:10px 11px; border:1.4px solid var(--linea);
    border-radius:9px; font-size:15px; outline:none; background:#fff;}
  .extra input:focus,.fform input:focus{border-color:var(--azul2);}
  .stamp{font-size:10.5px; color:var(--gris2); margin-top:8px;}
  .filters{display:flex; gap:7px; margin:2px 0 10px;}
  .fp{flex:1; text-align:center; font-size:12.5px; font-weight:700; padding:8px 4px; border-radius:9px;
    border:1.5px solid var(--linea); background:#fff; color:var(--gris);}
  .fp.on{background:var(--azul); border-color:var(--azul); color:#fff;}
  .empty{text-align:center; color:var(--gris2); font-size:14px; padding:40px 20px;}
  /* sheet / overlay */
  .overlay{position:fixed; inset:0; background:rgba(10,15,25,.5); z-index:100; display:none;}
  .overlay.show{display:block;}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:101; background:#fff; border-radius:18px 18px 0 0;
    padding:8px 16px 24px; transform:translateY(105%); transition:transform .25s; max-height:90vh; overflow:auto;}
  .sheet.show{transform:translateY(0);}
  .grip{width:40px; height:4px; background:#D5DAE2; border-radius:3px; margin:8px auto 12px;}
  .sheet h3{margin:2px 0 12px; font-size:16px; color:var(--azul);}
  .mitem{display:flex; align-items:center; gap:12px; padding:14px 6px; border-top:1px solid var(--linea); font-size:15px;}
  .mitem .ic{font-size:20px; width:26px; text-align:center;}
  .mitem b{font-weight:600;}
  .mitem small{display:block; color:var(--gris2); font-size:11.5px; font-weight:400;}
  .sheet .fld{margin:6px 0 2px;}
  .sheet .fld label{font-size:12px; color:var(--gris); font-weight:600;}
  .sheet .fld input{width:100%; padding:11px 13px; border:1.5px solid var(--linea); border-radius:10px; font-size:16px; margin-top:5px;}
  .act{display:block; width:100%; text-align:center; padding:14px; border-radius:11px; font-size:15px; font-weight:700; border:none; margin-top:12px;}
  .act.p{background:var(--azul); color:#fff;}
  .act.g{background:var(--verde); color:#fff;}
  .act.n{background:var(--naranja); color:#fff;}
  .act.o{background:#fff; color:var(--rojo); border:1.5px solid var(--rojob);}
  .act.q{background:#EAEEF4; color:var(--azul);}
  .act[disabled]{opacity:.5;}
  textarea.csv{width:100%; height:130px; font-family:monospace; font-size:11px; border:1.5px solid var(--linea);
    border-radius:10px; padding:10px; margin-top:6px;}
  .note{font-size:12px; color:var(--gris); background:var(--amarbg); border-radius:9px; padding:10px 12px; margin-top:10px; line-height:1.45;}
  .note.b{background:#EAF1FB; color:#2B4A75;}
  .steps{font-size:13px; color:#333; margin:8px 0 0; padding-left:18px; line-height:1.55;}
  .steps li{margin-bottom:7px;}
  .okbadge{display:inline-block; font-size:11px; font-weight:800; padding:3px 10px; border-radius:20px;}
  .ok-on{background:var(--verdebg); color:var(--verde);}
  .ok-off{background:#EDEFF3; color:var(--gris2);}
  .toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:#222b38; color:#fff; padding:11px 18px; border-radius:24px; font-size:13.5px; font-weight:600;
    z-index:200; transition:.25s; pointer-events:none; max-width:90%; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .fabbar{position:fixed; left:0; right:0; bottom:0; z-index:40; background:#fff; border-top:1px solid var(--linea);
    padding:9px 10px calc(9px + env(safe-area-inset-bottom)); display:flex; gap:8px; box-shadow:0 -2px 10px rgba(0,0,0,.06);}
  .fabbar button{flex:1; border:none; border-radius:11px; font-size:13.5px; font-weight:700; padding:13px 4px;}
  .fb-exp{background:var(--verde); color:#fff;}
  .fb-home{background:#EAEEF4; color:var(--azul);}
  .fb-hz{background:var(--naranja); color:#fff;}
  /* visor de foto */
  .pmodal{position:fixed; inset:0; z-index:150; background:rgba(8,12,20,.92); display:none;
    flex-direction:column; align-items:center; justify-content:center; padding:16px;}
  .pmodal.show{display:flex;}
  .pmodal img{max-width:100%; max-height:70vh; border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,.6);}
  .pmodal .prow2{display:flex; gap:10px; margin-top:16px; width:100%; max-width:420px;}
  .pmodal button{flex:1; padding:13px; border-radius:11px; border:none; font-size:14px; font-weight:700;}
  .pm-rep{background:#fff; color:var(--azul);}
  .pm-del{background:var(--rojo); color:#fff;}
  .pm-cls{background:rgba(255,255,255,.2); color:#fff;}

/* ======= Añadidos v3 (Firestore) ======= */
.syncdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle;background:#8A929C;}
.syncdot.on{background:#57c95f;}
.syncdot.off{background:#E9A7AC;}
.syncdot.busy{background:#FFD24C;}
.synctxt{font-size:10.5px;color:rgba(255,255,255,.85);}
.toggle2{display:flex;gap:8px;margin-top:6px;}
.toggle2 .tbtn{flex:1;border:1.6px solid var(--linea);background:#fff;color:#333;font-size:13px;font-weight:700;padding:11px 6px;border-radius:10px;text-align:center;}
.toggle2 .tbtn.sel{background:var(--azul);border-color:var(--azul);color:#fff;}
.tpickbtn{width:100%;text-align:left;padding:12px 13px;border:1.5px solid var(--linea);border-radius:10px;font-size:15px;background:#fff;color:#333;}
.tpickbtn .sub{display:block;font-size:11.5px;color:var(--gris2);margin-top:2px;}
.tlist-item{display:flex;align-items:center;justify-content:space-between;padding:13px 6px;border-top:1px solid var(--linea);font-size:14.5px;}
.tlist-item b{font-weight:700;}
.tlist-item small{display:block;color:var(--gris2);font-size:11.5px;font-weight:400;}
.tlist-item:active{background:#F6F8FC;}
.pill-mail{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--azul2);font-weight:600;margin-top:4px;}
.warnbox{font-size:12px;color:#7A4508;background:var(--amarbg);border-radius:9px;padding:9px 11px;margin-top:8px;line-height:1.45;}
.migoverlay{position:fixed;inset:0;background:#1F3864;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:30px;}
.migoverlay .spin{width:38px;height:38px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 0.9s linear infinite;margin-bottom:18px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>

</header>

<div class="searchbar">

<div id="view" class="wrap"></div>

<div class="fabbar" id="fabbar">

</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<div class="pmodal" id="pmodal">

  <div class="prow2">
    <button class="pm-rep" onclick="retakePhoto()">📷 Repetir</button>
    <button class="pm-del" onclick="deletePhoto()">🗑️ Eliminar</button>
    <button class="pm-cls" onclick="closePhoto()">Cerrar</button>
  </div>
</div>

<input type="file" id="camin" accept="image/*" capture="environment" hidden>

    err.textContent = msg;
  }).finally(function(){ btn.textContent="Iniciar sesión"; btn.disabled=false; });
}

/* ================= MIGRACIÓN INICIAL (una sola vez) ================= */
function migrarSemilla(){
  const mt=document.getElementById("migtxt"); if(mt) mt.textContent="Preparando su inventario por primera vez…";
  function chunk(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }

  // 1) Tarjetas únicas (por número de tarjeta original)
  const tarjMap = {};
  SEED.forEach(function(r){
    if(!tarjMap[r.t]) tarjMap[r.t] = {numero:r.t, responsable:r.n, empleado:r.e||"", puesto:r.p||"", tipo:r.tp||"INDIVIDUAL", correo:""};
  });
  const numsT = Object.keys(tarjMap);
  const tChunks = chunk(numsT,400);

  // 2) Bienes: dedupe por bienDocId (algunos códigos aparecen en >1 tarjeta = mismo bien físico)
  const grupos = {};
  SEED.forEach(function(r){
    const id = bienDocId(r.c); if(!id) return;
    (grupos[id]=grupos[id]||[]).push(r);
  });
  const bienesFinales = Object.keys(grupos).map(function(id){
    const g = grupos[id];
    g.sort(function(a,b){ // preferir NO-cómputo como tenedor "real" actual
      const ca = (a.tp||"").indexOf("MPUTO")>=0 ? 1:0, cb=(b.tp||"").indexOf("MPUTO")>=0?1:0;
      return ca-cb;
    });
    const primary = g[0];
    let nota = "";
    if(g.length>1){
      nota = "Al importar, este número también aparecía en: " + g.slice(1).map(function(x){return x.n+" (tarj. "+x.t+")";}).join("; ") + ". Verifique físicamente y use 'Nueva toma' para corregir si hace falta.";
    }
    return {id:id, r:primary, nota:nota};
  });
  const bChunks = chunk(bienesFinales,400);

  let idx=0;
  function nextT(){
    if(idx>=tChunks.length){ return nextBGroup(); }
    const batch = db.batch();
    tChunks[idx].forEach(function(numero){
      const d = tarjMap[numero];
      const ref = db.collection("tarjetas").doc(bienDocId(numero));
      batch.set(ref,{numero:numero,responsable:d.responsable,empleado:d.empleado,correo:d.correo,puesto:d.puesto,
        tipo:d.tipo,activa:true,creada:firebase.firestore.FieldValue.serverTimestamp(),actualizada:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    });
    idx++;
    if(mt) mt.textContent="Creando tarjetas… ("+Math.min(idx*400,numsT.length)+"/"+numsT.length+")";
    return batch.commit().then(nextT);
  }
  let bi=0;
  function nextBGroup(){
    if(bi>=bChunks.length){ return Promise.resolve(); }
    const batch = db.batch();
    bChunks[bi].forEach(function(item){
      const r = item.r;
      const ref = db.collection("bienes").doc(item.id);
      batch.set(ref,{
        codigo:r.c, descripcion:r.d, valor:Number(r.v)||0,
        tarjetaId: bienDocId(r.t), tarjetaNumero:r.t, responsable:r.n,
        tipo:r.tp||"INDIVIDUAL", ubicacion:"", estado:"", existe:"", fechaVerificacion:"", verificadoPor:"",
        esNuevo:false, observaciones:"", notaDuplicado: item.nota, fotoBien:0,
        actualizado: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });
    bi++;
    if(mt) mt.textContent="Importando bienes… ("+Math.min(bi*400,bienesFinales.length)+"/"+bienesFinales.length+")";
    return batch.commit().then(nextBGroup);
  }
  nextT().then(function(){
    toast("Importación inicial completa ✓");
    iniciarListeners();
  }).catch(function(e){
    if(mt) mt.textContent="Error durante la importación: "+e.message;
  });
}

/* ================= LISTENERS EN VIVO ================= */
let _unsubs = [];
function detenerListeners(){ _unsubs.forEach(function(fn){ try{ fn(); }catch(e){} }); _unsubs=[]; }
function iniciarListeners(){
  detenerListeners();
  _unsubs.push(db.collection("tarjetas").onSnapshot(function(snap){
    snap.docChanges().forEach(function(ch){
      if(ch.type==="removed"){ delete TARJETAS[ch.doc.id]; }
      else { TARJETAS[ch.doc.id] = Object.assign({id:ch.doc.id}, ch.doc.data()); }
    });
    ready.t = true; afterFirstSync();
    if(firstSyncDone) render();
  }, function(e){ setSync("off","Error de sincronización"); }));

  _unsubs.push(db.collection("bienes").onSnapshot(function(snap){
    snap.docChanges().forEach(function(ch){
      if(ch.type==="removed"){ delete BIENES[ch.doc.id]; }
      else { BIENES[ch.doc.id] = Object.assign({id:ch.doc.id}, ch.doc.data()); }
    });
    ready.b = true; afterFirstSync();
    if(firstSyncDone){ refreshProgress(); render(); }
  }, function(e){ setSync("off","Error de sincronización"); }));

  _unsubs.push(db.collection("hallazgos").onSnapshot(function(snap){
    snap.docChanges().forEach(function(ch){
      if(ch.type==="removed"){ delete HALLAZGOS[ch.doc.id]; }
      else { HALLAZGOS[ch.doc.id] = Object.assign({id:ch.doc.id}, ch.doc.data()); }
    });
    if(firstSyncDone && (mode.view==="hall"||mode.q)) render();
  }, function(){}));
}
let firstSyncDone=false;
function afterFirstSync(){
  if(firstSyncDone) return;
  if(ready.t && ready.b){
    firstSyncDone = true;
    const ov=document.getElementById("migoverlay"); if(ov) ov.style.display="none";
    setSync("on","Sincronizado");
    refreshProgress(); goHome();
    if(!META.by){ setTimeout(openMenu,500); }
  }
}
window.addEventListener("online", function(){ setSync("on","Sincronizado"); });
window.addEventListener("offline", function(){ setSync("off","Sin conexión — se guarda y sincroniza al volver"); });

  const tot = Object.keys(BIENES).length, done = totalDone();
  const pct = tot? Math.round(done/tot*100):0;
  document.getElementById("pbar").style.width=pct+"%";
  document.getElementById("pbartxt").textContent = done+" / "+tot+"  ("+pct+"%)";
}

    .sort(function(a,b){ return (a.responsable||"").localeCompare(b.responsable||""); });
}
function bienesDe(tarjetaId){ return Object.values(BIENES).filter(function(b){ return b.tarjetaId===tarjetaId; }); }
function doneCount(list){ return list.filter(function(b){return b.existe;}).length; }

function marcarPendientesNo(tarjetaId){
  const pend = bienesDe(tarjetaId).filter(function(b){ return !b.existe; });
  if(pend.length===0) return;
  if(!confirm("¿Marcar los "+pend.length+" bienes pendientes de esta tarjeta como NO (no están aquí)?")) return;
  const batch = db.batch();
  pend.forEach(function(b){
    batch.update(db.collection("bienes").doc(b.id), {existe:"NO", fechaVerificacion: today(), verificadoPor: META.by||"", actualizado: firebase.firestore.FieldValue.serverTimestamp()});
    const movRef = db.collection("movimientos").doc();
    batch.set(movRef, { codigo:b.codigo, tipoMovimiento:"VERIFICACION", tarjetaAnteriorNumero:"", responsableAnterior:"",
      tarjetaNuevaNumero:b.tarjetaNumero||"", responsableNuevo:b.responsable||"", existe:"NO", estado:b.estado||"",
      ubicacion:b.ubicacion||"", observaciones:"Marcado en lote: no se encontró en esta tarjeta",
      fecha: firebase.firestore.FieldValue.serverTimestamp(), fechaTxt: today(), capturadoPor: META.by||"" });
  });
  batch.commit().then(function(){ toast(pend.length+" bienes marcados como NO ✓"); }).catch(function(){ toast("No se pudo guardar"); });
}
function borrarTarjetaDefinitiva(id){

function itemCard(b, showOwner){

    ? '<input type="text" value="'+esc(b.descripcion||"")+'" onchange="markCampo(\''+id+'\',\'descripcion\',this.value)" placeholder="Descripción del bien" style="width:100%;padding:9px 11px;border:1.4px solid #E2E6EC;border-radius:9px;font-size:14px;margin:4px 0 2px">'
    : '<div class="desc">'+esc(b.descripcion||"")+'</div>';

    +'<div class="ochips">'+chipTipo(b.tipo)+nuevo+pendChip+dup+'</div>'
    +descField
    +(b.notaDuplicado?'<div class="warnbox">'+esc(b.notaDuplicado)+'</div>':'')
    +(b.tarjetaAnteriorNumero?'<div class="warnbox">↩ Descargado de tarjeta '+esc(b.tarjetaAnteriorNumero)+' ('+esc(b.responsableAnterior||"")+')</div>':'')
    +owner
    +asignarBtn
    +'<div class="bgrp">'
      +'<button class="btn b-si '+(b.existe==="SÍ"?"sel":"")+'" onclick="markExiste(\''+id+'\',\'SÍ\')">✓ SÍ<small>existe</small></button>'
      +'<button class="btn b-no '+(b.existe==="NO"?"sel":"")+'" onclick="markExiste(\''+id+'\',\'NO\')">✗ NO<small>no está</small></button>'
      +'<button class="btn b-nu '+(b.existe==="NO UBICADO"?"sel":"")+'" onclick="markExiste(\''+id+'\',\'NO UBICADO\')">? NO<small>ubicado</small></button>'
    +'</div>'
    +'<div class="bgrp estado" style="'+(b.existe==="SÍ"?"":"display:none")+'">'
      +['BUENO','REGULAR','MALO','PARA BAJA'].map(function(e){ const cl=e==="PARA BAJA"?"baja":e.toLowerCase();
        return '<button class="btn est e-'+cl+' '+(b.estado===e?"sel":"")+'" onclick="markEstado(\''+id+'\',\''+e+'\')">'+(e==="PARA BAJA"?"Baja":e.charAt(0)+e.slice(1).toLowerCase())+'</button>'; }).join("")
    +'</div>'

      +'<button class="fotobtn" id="fb_B'+id+'" onclick="takePhoto(\'B'+id+'\')">📷 Foto</button>'

      +'<label>Observaciones</label><input type="text" value="'+esc(b.observaciones||"")+'" onchange="markCampo(\''+id+'\',\'observaciones\',this.value)" placeholder="Ej. sin serie visible">'
    +'</div>'
    +(b.fechaVerificacion?'<div class="stamp">✓ '+esc(b.fechaVerificacion)+(b.verificadoPor?" · "+esc(b.verificadoPor):"")+'</div>':'')
  +'</div>';

function borrarBien(id){
  const b = BIENES[id]; if(!b) return;
  if(!confirm('¿Borrar el registro "'+b.codigo+'" ('+(b.descripcion||"sin descripción")+')? No se puede deshacer.')) return;

  db.collection("bienes").doc(id).delete().then(function(){ toast("Registro borrado ✓"); }).catch(function(){ toast("No se pudo borrar"); });
}
function toggleExtra(id){ const e=document.getElementById("ex_"+id); if(e) e.classList.toggle("open"); }
function markExiste(id,val){
  const b = BIENES[id]; if(!b) return;
  const nuevo = b.existe===val ? "" : val;
  const patch = { existe: nuevo, actualizado: firebase.firestore.FieldValue.serverTimestamp() };
  if(nuevo){ patch.fechaVerificacion = today(); patch.verificadoPor = META.by||""; }
  db.collection("bienes").doc(id).update(patch).catch(function(){ toast("No se pudo guardar (revise conexión)"); });
  logMovimiento(b, {tipoMovimiento:"VERIFICACION", estado:b.estado||"", existe:nuevo, ubicacion:b.ubicacion||"", observaciones:b.observaciones||""});
}
function markEstado(id,val){
  const b = BIENES[id]; if(!b) return;
  const nuevo = b.estado===val? "" : val;
  db.collection("bienes").doc(id).update({estado:nuevo, actualizado: firebase.firestore.FieldValue.serverTimestamp()}).catch(function(){ toast("No se pudo guardar"); });
}
function markCampo(id,campo,val){

}
function logMovimiento(b, extra){
  const rec = Object.assign({
    codigo: b.codigo, tarjetaNumero: b.tarjetaNumero, responsable: b.responsable,
    fecha: firebase.firestore.FieldValue.serverTimestamp(), fechaTxt: today(), capturadoPor: META.by||""
  }, extra);
  db.collection("movimientos").add(rec).catch(function(){});
}
function editCorreoTarjeta(id){

let _fusion = {origen:null, destino:null};
function abrirFusion(){ _fusion = {origen:null, destino:null}; renderFusionSheet(); }
function renderFusionSheet(){
  const list = tarjetasActivas();
  function rowFor(t, campo){
    const items = bienesDe(t.id);
    return '<div class="tlist-item" onclick="fusionElegir(\''+campo+'\',\''+t.id+'\')"><div><b>'+esc(t.responsable||"(sin nombre)")+'</b>'
      +'<small>Tarjeta '+esc(t.numero||"(pendiente)")+' · '+items.length+' bien(es)</small></div><span style="color:#B8C0CC">›</span></div>';
  }
  let h = '<div class="grip"></div><h3>🔀 Fusionar tarjetas duplicadas</h3>'
    +'<div class="note">Use esto cuando la misma persona quedó con dos tarjetas (por escribir el nombre distinto, por ejemplo). Todos los bienes de la tarjeta A pasan a la tarjeta B, y A queda inactiva (no se borra, por auditoría).</div>';
  h += '<label style="font-size:12px;font-weight:700;color:#5B6470;display:block;margin-top:10px">Tarjeta A (la que sobra)</label>';
  if(_fusion.origen){ const t=TARJETAS[_fusion.origen]; h += '<div class="tpickbtn" style="margin:6px 0 10px">'+esc(t.responsable)+' — Tarjeta '+esc(t.numero||"(pendiente)")+'</div>'; }
  else { h += '<div>'+list.map(function(t){return rowFor(t,'origen');}).join("")+'</div>'; }
  if(_fusion.origen){
    h += '<label style="font-size:12px;font-weight:700;color:#5B6470;display:block;margin-top:10px">Tarjeta B (a la que se une todo)</label>';
    if(_fusion.destino){ const t=TARJETAS[_fusion.destino]; h += '<div class="tpickbtn" style="margin:6px 0 10px">'+esc(t.responsable)+' — Tarjeta '+esc(t.numero||"(pendiente)")+'</div>'; }
    else { h += '<div>'+list.filter(function(t){return t.id!==_fusion.origen;}).map(function(t){return rowFor(t,'destino');}).join("")+'</div>'; }
  }
  if(_fusion.origen && _fusion.destino){ h += '<button class="act n" onclick="confirmarFusion()">Fusionar ahora</button>'; }
  h += '<button class="act o" onclick="closeMenu()">Cancelar</button>';
  document.getElementById("sheet").innerHTML = h;
  showSheet();
}

function confirmarFusion(){
  const origen = TARJETAS[_fusion.origen], destino = TARJETAS[_fusion.destino];
  if(!origen || !destino) return;
  if(!confirm('¿Mover todos los bienes de "'+origen.responsable+'" (Tarj. '+(origen.numero||"pendiente")+') a "'+destino.responsable+'" (Tarj. '+(destino.numero||"pendiente")+')? No se puede deshacer.')) return;
  const items = bienesDe(origen.id);
  const batch = db.batch();
  items.forEach(function(b){
    batch.update(db.collection("bienes").doc(b.id), {
      tarjetaId: destino.id, tarjetaNumero: destino.numero||"", responsable: destino.responsable,
      actualizado: firebase.firestore.FieldValue.serverTimestamp()
    });
    const movRef = db.collection("movimientos").doc();
    batch.set(movRef, { codigo:b.codigo, tipoMovimiento:"FUSION_TARJETAS",
      tarjetaAnteriorNumero: origen.numero||"", responsableAnterior: origen.responsable,
      tarjetaNuevaNumero: destino.numero||"", responsableNuevo: destino.responsable,
      estado:b.estado||"", ubicacion:b.ubicacion||"", observaciones:"Fusión de tarjetas duplicadas",
      fecha: firebase.firestore.FieldValue.serverTimestamp(), fechaTxt: today(), capturadoPor: META.by||"" });
  });
  batch.update(db.collection("tarjetas").doc(origen.id), {activa:false, actualizada: firebase.firestore.FieldValue.serverTimestamp()});
  batch.commit().then(function(){ toast("Fusionadas ✓ ("+items.length+" bienes movidos)"); closeMenu(); goHome(); })
    .catch(function(){ toast("No se pudo fusionar"); });
}

}

function tarjetaDocId(numero){ return (numero && String(numero).trim()) ? bienDocId(numero) : null; }
function buscarTarjetaPorNombre(nombre){
  const n = norm(nombre);
  if(!n) return null;
  return Object.values(TARJETAS).find(function(t){ return t.activa!==false && norm(t.responsable)===n; }) || null;
}
function resolverTarjetaDestino(s){
  if(s.tipo==="existente" && s.tarjetaId){
    return db.collection("tarjetas").doc(s.tarjetaId).set({
      responsable: s.persona, empleado: s.empleado||"", correo: s.correo||"",
      actualizada: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true}).then(function(){ return {id:s.tarjetaId, numero:s.numero||""}; });
  }
  let tid = tarjetaDocId(s.numero);
  let numeroFinal = s.numero||"";
  if(!tid){
    const previa = buscarTarjetaPorNombre(s.persona);
    if(previa){ tid = previa.id; numeroFinal = previa.numero||""; }
    else { tid = "PEND_"+bienDocId(s.persona); }
  }
  const ref = db.collection("tarjetas").doc(tid);
  return ref.set({
    numero: numeroFinal, responsable: s.persona, empleado: s.empleado||"", correo: s.correo||"",
    puesto: "", tipo: "INDIVIDUAL", activa: true,
    creada: firebase.firestore.FieldValue.serverTimestamp(), actualizada: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge:true}).then(function(){ return {id:ref.id, numero:numeroFinal}; });
}
function saveSession(){
  const s = curSes;
  if(!s.persona || !s.persona.trim()){ toast("Escriba el nombre del responsable"); return; }
  if(!s.loc){ toast("Elija la ubicación"); return; }
  if(s.items.length===0){ toast("Agregue al menos un número de bien"); return; }
  toast("Guardando…");
  resolverTarjetaDestino(s).then(function(dest){
    const batch = db.batch();
    const nowTxt = today();
    s.items.forEach(function(it){
      const cn = bienDocId(it.codigo);
      const ref = db.collection("bienes").doc(cn);
      const huboTraslado = !it.esNuevo && it.origenTarjetaId && it.origenTarjetaId!==dest.id;
      const tieneFoto = !!(it.fotoB64 || it.foto);
      const datosBien = {
        codigo: it.codigo, descripcion: it.desc||it.codigo, valor: it.valor||0,
        tarjetaId: dest.id, tarjetaNumero: dest.numero||"", responsable: s.persona,
        tipo: it.esNuevo? "INDIVIDUAL": (it.tipoOrig||"INDIVIDUAL"),
        ubicacion: s.loc, estado: it.estado||"", existe: "SÍ",
        fechaVerificacion: nowTxt, verificadoPor: META.by||"",
        esNuevo: !!it.esNuevo, observaciones: it.obs||"", notaDuplicado: "",
        tarjetaAnteriorNumero: huboTraslado? (it.origenTarjetaNumero||"") : "",
        responsableAnterior: huboTraslado? (it.origenResponsable||"") : "",
        actualizado: firebase.firestore.FieldValue.serverTimestamp()
      };
      if(tieneFoto) datosBien.fotoBien = 1;
      batch.set(ref, datosBien, {merge:true});
      const movRef = db.collection("movimientos").doc();
      batch.set(movRef, {
        codigo: it.codigo, tipoMovimiento: it.esNuevo?"HALLAZGO_ASIGNADO":"REASIGNACION",
        tarjetaAnteriorNumero: it.origenTarjetaNumero||"", responsableAnterior: it.origenResponsable||"",
        tarjetaNuevaNumero: dest.numero||"", responsableNuevo: s.persona,
        estado: it.estado||"", ubicacion: s.loc, observaciones: it.obs||"",
        fecha: firebase.firestore.FieldValue.serverTimestamp(), fechaTxt: nowTxt, capturadoPor: META.by||""
      });
      // Mover la foto de la toma (clave temporal) a la clave permanente del bien, para que no se pierda al ver el bien después
      if(it.fotoB64){
        fotoPut({k:"B"+cn, b64:it.fotoB64, name: it.fotoName||("BIEN_"+cn+".jpg"), ts:Date.now()});
        fotoDel("A"+it.iid);
      } else if(it.foto){
        fotoGet("A"+it.iid).then(function(r){
          if(r){ fotoPut({k:"B"+cn, b64:r.b64, name:r.name, ts:Date.now()}); fotoDel("A"+it.iid); }
        }).catch(function(){});
      }
    });
    return batch.commit().then(function(){ return dest; });
  }).then(function(dest){
    toast("Toma guardada ✓ ("+s.items.length+" bienes)");
    return notificarPersona(s, dest.numero||"");
  }).then(function(){
    curSes = null; goHome();
  }).catch(function(e){
    toast("No se pudo guardar: "+(e.message||e));
  });
}
function notificarPersona(s, numeroReal){
  if(!s || !s.correo){ return Promise.resolve(); }
  if(!META.gsUrl){ toast("⚠️ Bienes guardados, pero falta configurar Apps Script para enviar el correo (menú ☰)"); return Promise.resolve(); }
  const itemsMail = s.items.map(function(it){
    return { codigo: it.codigo, desc: it.desc||"", valor: Number(it.valor||0), estado: it.estado||"" };
  });
  const detalle = s.items.map(function(it){
    return "• "+it.codigo+(it.desc?(" — "+it.desc):"")+(it.valor?(" — Q"+Number(it.valor).toLocaleString("es-GT",{minimumFractionDigits:2})):"")
      +(it.estado?(" — Estado: "+it.estado):"");
  }).join("\n");
  // Recolectar fotos: preferir el b64 en memoria (tomado en esta sesión); si no, leer de IndexedDB
  const fotoPromesas = [];
  s.items.forEach(function(it){
    if(it.fotoB64){ fotoPromesas.push(Promise.resolve({name: it.fotoName||("BIEN_"+it.codigo+".jpg"), b64: it.fotoB64})); }
    else if(it.foto){ fotoPromesas.push(fotoGet("A"+it.iid).then(function(r){ return r?{name:r.name,b64:r.b64}:null; }).catch(function(){return null;})); }
  });
  if(s.fotoB64){ fotoPromesas.push(Promise.resolve({name: s.fotoName||"LUGAR.jpg", b64: s.fotoB64})); }
  else if(s.foto){ fotoPromesas.push(fotoGet("Lses").then(function(r){ return r?{name:r.name,b64:r.b64}:null; }).catch(function(){return null;})); }
  const conFoto = fotoPromesas.length;
  return Promise.all(fotoPromesas).then(function(fotos){
    const payload = { type:"notificar", correo:s.correo, persona:s.persona, tarjeta:numeroReal||"(pendiente)",
      ubicacion:s.loc, fecha: today(), capturadoPor: META.by||"", detalle: detalle, items: itemsMail,
      fotos: fotos.filter(Boolean) };
    return fetch(META.gsUrl, {method:"POST", body: JSON.stringify(payload)});
  }).then(function(){
    toast("✉️ Correo enviado a "+s.correo+(conFoto?" con "+conFoto+" foto(s)":""));
  }).catch(function(e){
    toast("⚠️ Los bienes SÍ se guardaron, pero el correo no se pudo enviar (revise conexión/Apps Script)");
  });
}

/* ================= FOTOS (cámara + IndexedDB) ================= */
let idb=null;
function openIDB(){ return new Promise(function(res,rej){
  if(idb) return res(idb);
  const rq = indexedDB.open("inv_fotos_ai_v3",1);
  rq.onupgradeneeded=function(e){ e.target.result.createObjectStore("fotos",{keyPath:"k"}); };
  rq.onsuccess=function(e){ idb=e.target.result; res(idb); };
  rq.onerror=function(e){ rej(e); };
});}
function fotoPut(rec){ return openIDB().then(function(d2){ return new Promise(function(res,rej){
  const tx=d2.transaction("fotos","readwrite"); tx.objectStore("fotos").put(rec); tx.oncomplete=res; tx.onerror=rej; }); }); }
function fotoGet(k){ return openIDB().then(function(d2){ return new Promise(function(res,rej){
  const rq=d2.transaction("fotos").objectStore("fotos").get(k); rq.onsuccess=function(){res(rq.result||null);}; rq.onerror=rej; }); }); }
function fotoDel(k){ return openIDB().then(function(d2){ return new Promise(function(res,rej){
  const tx=d2.transaction("fotos","readwrite"); tx.objectStore("fotos").delete(k); tx.oncomplete=res; tx.onerror=rej; }); }); }
let camTarget=null;
function takePhoto(k){ camTarget=k; const c=document.getElementById("camin"); c.value=""; c.click(); }
document.getElementById("camin").addEventListener("change", function(){
  const f=this.files&&this.files[0]; if(!f||!camTarget) return;
  const tgt = camTarget;
  compressImage(f,function(b64){
    const name = fotoName(tgt);
    // Guardar el b64 en memoria para que el correo no dependa de releer IndexedDB
    if(tgt[0]==="A" && curSes){ const it=curSes.items.find(function(x){return x.iid===tgt.slice(1);}); if(it){ it.fotoB64=b64; it.fotoName=name; } }
    else if(tgt==="Lses" && curSes){ curSes.fotoB64=b64; curSes.fotoName=name; }
    fotoPut({k:tgt,b64:b64,name:name,ts:Date.now()}).then(function(){
      marcarFotoFlag(tgt);
      toast("Foto guardada ✓"); refreshFotoUI(tgt);
      subirFoto(name,b64);
    }).catch(function(){ toast("No se pudo guardar la foto"); });
  });
});

function sincronizarExcel(){
  closeMenu();
  if(typeof XLSX==="undefined"){ toast("No se pudo cargar el lector de Excel (revise internet)"); return; }
  window.__excelMode = "sincronizar";
  document.getElementById("sheet").innerHTML = '<div class="grip"></div><h3>🔄 Sincronizar con Excel oficial</h3>'
    +'<div class="note">Use esto cuando tenga el listado OFICIAL completo (por ejemplo, el reporte de SICOIN). La app va a: <b>agregar</b> los bienes del archivo que no estén en el sistema, y <b>eliminar</b> del sistema los que ya NO aparezcan en el archivo. Antes de borrar nada le muestro la lista completa para que la revise.</div>'
    +'<button class="act p" onclick="document.getElementById(\'excelin\').click()">📎 Elegir archivo Excel oficial</button>'
    +'<button class="act o" onclick="closeMenu()">Cancelar</button>';
  showSheet();
}
document.getElementById("excelin").addEventListener("change", function(){
  const f = this.files && this.files[0]; const self=this; if(!f) return;
  toast("Leyendo archivo…");
  const rd = new FileReader();
  rd.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:"array"});
      const elegida = elegirMejorHoja(wb);
      if(!elegida){ toast("No encontré una hoja con una columna de No. de Inventario reconocible."); return; }
      if(window.__excelMode==="sincronizar") procesarSincronizacion(elegida.rows, f.name, elegida.nombre, wb.SheetNames.length);
      else if(window.__excelMode==="reconstruir") procesarReconstruccion(elegida.rows, f.name, elegida.nombre, wb.SheetNames.length);
      else if(window.__excelMode==="reiniciar") procesarReinicio(elegida.rows, f.name, elegida.nombre, wb.SheetNames.length);
      else if(window.__excelMode==="valores") procesarActualizarValores(elegida.rows, f.name, elegida.nombre, wb.SheetNames.length);
      else procesarFilasImportadas(elegida.rows, elegida.nombre, wb.SheetNames.length);
    }catch(err){ toast("No se pudo leer el archivo: "+(err.message||err)); }
    self.value="";
  };
  rd.readAsArrayBuffer(f);
});
// Si el libro tiene varias hojas, se prueban TODAS y se usa la que de verdad tenga una columna
// de No. de Inventario reconocible con más filas válidas — para no tomar por accidente una
// hoja de resumen/portada (esto fue justo lo que causó el borrado accidental anterior).
function elegirMejorHoja(wb){
  let mejor = null;
  wb.SheetNames.forEach(function(nombre){
    const ws = wb.Sheets[nombre];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
    if(!rows.length) return;
    const {colCod} = leerColumnas(rows);
    if(!colCod) return;
    const validas = rows.filter(function(r){ return esCodigoValido(r[colCod]); }).length;
    if(!mejor || validas > mejor.validas){ mejor = {nombre:nombre, rows:rows, validas:validas}; }
  });
  return mejor;
}
// Un código de inventario real es corto y no es una frase. Esto evita que una fila de
// resumen tipo "Bienes en el archivo oficial" se cuele como si fuera un número de bien.
function esCodigoValido(v){
  const s = String(v==null?"":v).trim();
  if(!s) return false;
  if(s.length>20) return false;
  if((s.match(/ /g)||[]).length>1) return false;
  return true;
}
function hallarColumna(row, claves){
  const keys = Object.keys(row);
  // primero buscar coincidencia exacta (más confiable)
  for(let i=0;i<keys.length;i++){
    const kn = keys[i].toUpperCase().trim();
    for(let j=0;j<claves.length;j++){ if(kn===claves[j]) return keys[i]; }
  }
  // si no hay exacta, buscar que la columna CONTENGA la palabra clave
  for(let i=0;i<keys.length;i++){
    const kn = keys[i].toUpperCase();
    for(let j=0;j<claves.length;j++){ if(claves[j].length>=4 && kn.indexOf(claves[j])>=0) return keys[i]; }
  }
  return null;
}
function leerColumnas(rows){
  const first = rows[0];
  const colCod = hallarColumna(first, ["NO_BIEN","INVENTARIO","CÓDIGO","CODIGO","NO."]);
  const colDesc = hallarColumna(first, ["DESCRIPCION","DESCRIP"]);
  const colVal = hallarColumna(first, ["MONTO","VALOR","PRECIO","COSTO"]);
  const colNombre = hallarColumna(first, ["NOMBRE"]);
  const colTarjeta = hallarColumna(first, ["TARJETA"]);
  const colSiges = hallarColumna(first, ["BIESIC","SIGES"]);
  return {colCod, colDesc, colVal, colNombre, colTarjeta, colSiges};
}
function procesarFilasImportadas(rows, nombreHoja, totalHojas){
  if(!rows.length){ toast("El archivo no tiene filas de datos"); return; }
  const {colCod, colDesc, colVal} = leerColumnas(rows);
  if(!colCod){ toast("No encontré una columna de No. de Inventario en el archivo"); return; }
  const nuevos = []; let vacios=0, existentes=0, invalidos=0;
  const vistos = {};
  rows.forEach(function(r){
    const cod = String(r[colCod]==null?"":r[colCod]).trim();
    if(!cod){ vacios++; return; }
    if(!esCodigoValido(cod)){ invalidos++; return; }
    const id = bienDocId(cod);
    if(vistos[id]) return; vistos[id]=1;
    if(BIENES[id]){ existentes++; return; }
    nuevos.push({ id:id, codigo:cod, descripcion: colDesc? String(r[colDesc]==null?"":r[colDesc]).trim() : "", valor: colVal? (Number(r[colVal])||0) : 0 });
  });
  if(nuevos.length===0){ toast("No hay bienes nuevos para importar (¿ya estaban todos en el sistema?)"); return; }
  document.getElementById("sheet").innerHTML = '<div class="grip"></div><h3>Confirmar importación</h3>'
    +(totalHojas>1?'<div class="note">Se leyó la hoja "<b>'+esc(nombreHoja)+'</b>" (el archivo tiene '+totalHojas+' hojas).</div>':'')
    +'<div class="note">Se importarán <b>'+nuevos.length+'</b> bien(es) nuevo(s), pendientes de asignar.'
    +(existentes?('<br>'+existentes+' número(s) ya existían en el sistema y se omiten (no se sobrescriben).'):'')
    +(vacios?('<br>'+vacios+' fila(s) sin número de inventario, se omiten.'):'')
    +(invalidos?('<br>'+invalidos+' fila(s) con un valor que no parece número de inventario, se omiten.'):'')+'</div>'
    +'<div style="max-height:220px;overflow:auto;border:1px solid #E2E6EC;border-radius:9px;margin-top:8px">'
    + nuevos.slice(0,30).map(function(n){ return '<div style="padding:8px 10px;border-bottom:1px solid #F0F2F6;font-size:13px"><b>'+esc(n.codigo)+'</b> — '+esc(n.descripcion||"(sin descripción)")+'</div>'; }).join("")
    + (nuevos.length>30?('<div style="padding:8px 10px;font-size:12px;color:#8A929C">…y '+(nuevos.length-30)+' más</div>'):'')
    +'</div>'
    +'<button class="act g" onclick="confirmarImportacion()">✓ Importar '+nuevos.length+' bien(es)</button>'
    +'<button class="act o" onclick="closeMenu()">Cancelar</button>';
  window.__importPend = nuevos;
  showSheet();
}
function confirmarImportacion(){
  const nuevos = window.__importPend||[];
  if(!nuevos.length) return;
  closeMenu();
  toast("Importando "+nuevos.length+" bien(es)…");
  function chunk(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }
  const chunks = chunk(nuevos,400);
  let i=0;
  function next(){
    if(i>=chunks.length){ toast("✓ Importación completa ("+nuevos.length+" bienes)"); window.__importPend=null; goHome(); return; }
    const batch = db.batch();
    chunks[i].forEach(function(n){
      batch.set(db.collection("bienes").doc(n.id), {
        codigo:n.codigo, descripcion:n.descripcion||n.codigo, valor:n.valor||0,
        tarjetaId:null, tarjetaNumero:"", responsable:"",
        tipo:"INDIVIDUAL", ubicacion:"", estado:"", existe:"", fechaVerificacion:"", verificadoPor:"",
        esNuevo:true, observaciones:"", notaDuplicado:"", fotoBien:0,
        actualizado: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });
    i++;
    batch.commit().then(next).catch(function(e){ toast("Error al importar: "+(e.message||e)); });
  }
  next();
}

/* ================= SINCRONIZAR (agregar + eliminar) ================= */
function procesarSincronizacion(rows, nombreArchivo, nombreHoja, totalHojas){
  if(!rows.length){ toast("El archivo no tiene filas de datos"); return; }
  const {colCod, colDesc, colVal} = leerColumnas(rows);
  if(!colCod){ toast("No encontré una columna de No. de Inventario en el archivo"); return; }
  const enArchivo = {}; const nuevos = []; let vacios=0, invalidos=0;
  rows.forEach(function(r){
    const cod = String(r[colCod]==null?"":r[colCod]).trim();
    if(!cod){ vacios++; return; }
    if(!esCodigoValido(cod)){ invalidos++; return; }
    const id = bienDocId(cod);
    if(enArchivo[id]) return;
    enArchivo[id] = true;
    if(!BIENES[id]){
      nuevos.push({ id:id, codigo:cod, descripcion: colDesc? String(r[colDesc]==null?"":r[colDesc]).trim() : "", valor: colVal? (Number(r[colVal])||0) : 0 });
    }
  });
  const totalActual = Object.keys(BIENES).length;
  const sobran = Object.values(BIENES).filter(function(b){ return !enArchivo[b.id]; });
  const pctBorrado = totalActual? Math.round(sobran.length/totalActual*100) : 0;

  let h = '<div class="grip"></div><h3>🔄 Confirmar sincronización</h3>'
    +(totalHojas>1?'<div class="note">Se leyó la hoja "<b>'+esc(nombreHoja)+'</b>" (el archivo tiene '+totalHojas+' hojas).</div>':'')
    +'<div class="note">Archivo: <b>'+esc(nombreArchivo||"")+'</b> · '+Object.keys(enArchivo).length+' bienes reconocidos'
    +(invalidos?(' · '+invalidos+' fila(s) ignoradas por no parecer números de inventario'):'')+'.</div>'
    +'<div class="note" style="background:#EAF6EC;border-color:#BFE3C6">✓ <b>'+nuevos.length+'</b> bien(es) nuevo(s) del archivo se agregarán como pendientes de asignar.</div>';
  if(sobran.length){
    if(pctBorrado>=25){
      h += '<div class="warnbox" style="font-size:14px;background:#FDE8E8;border-color:#F3B4B4;color:#7A1F1F">🛑 <b>ATENCIÓN: esto eliminaría el '+pctBorrado+'% de su base de datos actual</b> ('+sobran.length+' de '+totalActual+' bienes). Si no esperaba un número tan alto, probablemente subió el archivo equivocado o una hoja que no es la de bienes — revise antes de continuar.</div>';
    }
    h += '<div class="warnbox" style="font-size:13px">⚠️ <b>'+sobran.length+'</b> bien(es) que están en el sistema NO aparecen en este archivo y se ELIMINARÁN por completo (se borra el registro; queda una nota en Movimientos por auditoría, pero ya no se podrá ver ni editar el bien).</div>'
      +'<div style="max-height:220px;overflow:auto;border:1px solid #E2E6EC;border-radius:9px;margin-top:8px">'
      + sobran.slice(0,40).map(function(b){ return '<div style="padding:8px 10px;border-bottom:1px solid #F0F2F6;font-size:13px"><b>'+esc(b.codigo)+'</b> — '+esc(b.descripcion||"")+' <span style="color:#8A929C">('+esc(b.responsable||"sin asignar")+')</span></div>'; }).join("")
      + (sobran.length>40?('<div style="padding:8px 10px;font-size:12px;color:#8A929C">…y '+(sobran.length-40)+' más</div>'):'')
      +'</div>'
      +'<label style="margin-top:10px">Para confirmar el borrado, escriba ELIMINAR</label>'
      +'<input type="text" id="syncConfirmTxt" placeholder="ELIMINAR" style="width:100%;padding:11px;border:1.4px solid #E2E6EC;border-radius:9px;font-size:15px;text-transform:uppercase">';
  } else {
    h += '<div class="note">No hay bienes de más — no se eliminará nada.</div>';
  }
  h += '<button class="act g" style="margin-top:12px" onclick="confirmarSincronizacion()">✓ Aplicar sincronización</button>'
    +'<button class="act o" onclick="closeMenu()">Cancelar</button>';
  document.getElementById("sheet").innerHTML = h;
  window.__syncPend = {nuevos: nuevos, sobran: sobran, archivo: nombreArchivo||""};
  showSheet();
}
function confirmarSincronizacion(){
  const s = window.__syncPend; if(!s) return;
  if(s.sobran.length){
    const txt = (document.getElementById("syncConfirmTxt")||{}).value || "";
    if(txt.trim().toUpperCase()!=="ELIMINAR"){ toast('Escriba la palabra ELIMINAR para confirmar el borrado'); return; }
    if(!confirm("Última confirmación: se eliminarán "+s.sobran.length+" bienes que no están en el archivo. Esto no se puede deshacer. ¿Continuar?")) return;
  }
  closeMenu();
  toast("Sincronizando…");
  function chunk(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }
  const nowTxt = today();
  const pasos = [];
  chunk(s.nuevos,300).forEach(function(grp){ pasos.push({tipo:"add", grp:grp}); });
  chunk(s.sobran,300).forEach(function(grp){ pasos.push({tipo:"del", grp:grp}); });
  let i=0;
  function next(){
    if(i>=pasos.length){
      toast("✓ Sincronización completa: "+s.nuevos.length+" agregados, "+s.sobran.length+" eliminados");
      window.__syncPend=null; goHome(); return;
    }
    const paso = pasos[i]; const batch = db.batch();
    if(paso.tipo==="add"){
      paso.grp.forEach(function(n){
        batch.set(db.collection("bienes").doc(n.id), {
          codigo:n.codigo, descripcion:n.descripcion||n.codigo, valor:n.valor||0,
          tarjetaId:null, tarjetaNumero:"", responsable:"",
          tipo:"INDIVIDUAL", ubicacion:"", estado:"", existe:"", fechaVerificacion:"", verificadoPor:"",
          esNuevo:true, observaciones:"", notaDuplicado:"", fotoBien:0,
          actualizado: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge:true});
      });
    } else {
      paso.grp.forEach(function(b){
        batch.delete(db.collection("bienes").doc(b.id));
        const movRef = db.collection("movimientos").doc();
        batch.set(movRef, { codigo:b.codigo, tipoMovimiento:"BAJA_SINCRONIZACION",
          tarjetaAnteriorNumero: b.tarjetaNumero||"", responsableAnterior: b.responsable||"",
          tarjetaNuevaNumero:"", responsableNuevo:"",
          estado:b.estado||"", ubicacion:b.ubicacion||"",
          observaciones:"Eliminado por no aparecer en el archivo oficial: "+(s.archivo||""),
          fecha: firebase.firestore.FieldValue.serverTimestamp(), fechaTxt: nowTxt, capturadoPor: META.by||"" });
        fotoDel("B"+b.id);
      });
    }
    i++;
    batch.commit().then(next).catch(function(e){ toast("Error en la sincronización: "+(e.message||e)); });
  }
  next();
}

/* ================= RECONSTRUIR (recrea bienes y tarjetas desde el Excel oficial) ================= */
function reconstruirExcel(){
  closeMenu();
  if(typeof XLSX==="undefined"){ toast("No se pudo cargar el lector de Excel (revise internet)"); return; }
  window.__excelMode = "reconstruir";
  document.getElementById("sheet").innerHTML = '<div class="grip"></div><h3>🏗️ Reconstruir desde Excel oficial</h3>'
    +'<div class="note">Suba el reporte oficial completo (el que trae columnas de No. de Inventario, Descripción, <b>Nombre</b> y <b>Tarjeta</b> — por ejemplo el de SICOIN). La app crea o actualiza cada bien con su tarjeta y responsable correctos según ese archivo. <b>No elimina nada</b> — solo agrega y corrige asignaciones.</div>'
    +'<button class="act p" onclick="document.getElementById(\'excelin\').click()">📎 Elegir archivo Excel oficial</button>'
    +'<button class="act o" onclick="closeMenu()">Cancelar</button>';
  showSheet();
}
function procesarReconstruccion(rows, nombreArchivo, nombreHoja, totalHojas){
  if(!rows.length){ toast("El archivo no tiene filas de datos"); return; }
  const {colCod, colDesc, colVal, colNombre, colTarjeta, colSiges} = leerColumnas(rows);
  if(!colCod){ toast("No encontré una columna de No. de Inventario en el archivo"); return; }
  if(!colNombre || !colTarjeta){
    toast("Este archivo no trae columnas de Nombre y Tarjeta — use mejor 'Importar bienes nuevos'.");
    return;
  }
  const items = []; let vacios=0, invalidos=0;
  const vistos = {};
  rows.forEach(function(r){
    const cod = String(r[colCod]==null?"":r[colCod]).trim();
    if(!cod){ vacios++; return; }
    if(!esCodigoValido(cod)){ invalidos++; return; }
    const id = bienDocId(cod);
    if(vistos[id]) return; vistos[id]=1;
    items.push({
      id:id, codigo:cod,
      codigoSiges: colSiges? String(r[colSiges]==null?"":r[colSiges]).trim() : "",
      descripcion: colDesc? String(r[colDesc]==null?"":r[colDesc]).trim() : "",
      valor: colVal? (Number(r[colVal])||0) : 0,
      nombre: String(r[colNombre]==null?"":r[colNombre]).trim(),
      tarjeta: String(r[colTarjeta]==null?"":r[colTarjeta]).trim()
    });
  });
  const nuevos = items.filter(function(it){ return !BIENES[it.id]; });
  const reasignados = items.filter(function(it){ return BIENES[it.id] && norm(BIENES[it.id].tarjetaNumero||"")!==norm(it.tarjeta); });
  const tarjetasUnicas = {};
  items.forEach(function(it){ if(it.tarjeta) tarjetasUnicas[it.tarjeta]=it.nombre; });

  let h = '<div class="grip"></div><h3>🏗️ Confirmar reconstrucción</h3>'
    +(totalHojas>1?'<div class="note">Se leyó la hoja "<b>'+esc(nombreHoja)+'</b>" (el archivo tiene '+totalHojas+' hojas).</div>':'')
    +'<div class="note">Archivo: <b>'+esc(nombreArchivo||"")+'</b> · '+items.length+' bienes reconocidos, '+Object.keys(tarjetasUnicas).length+' tarjetas distintas.'
    +(invalidos?(' · '+invalidos+' fila(s) ignoradas por no parecer números de inventario'):'')+'</div>'
    +'<div class="note" style="background:#EAF6EC;border-color:#BFE3C6">✓ <b>'+nuevos.length+'</b> bien(es) se crearán nuevos, ya asignados a su tarjeta correcta.</div>'
    +(reasignados.length?('<div class="warnbox" style="font-size:13px">↩ <b>'+reasignados.length+'</b> bien(es) que ya existían cambiarán de tarjeta/responsable según este archivo (su estado de verificación, fotos y observaciones NO se tocan, solo la asignación).</div>'):'<div class="note">Ningún bien existente cambia de tarjeta.</div>')
    +'<button class="act g" style="margin-top:12px" onclick="confirmarReconstruccion()">✓ Reconstruir ('+items.length+' bienes)</button>'
    +'<button class="act o" onclick="closeMenu()">Cancelar</button>';
  document.getElementById("sheet").innerHTML = h;
  window.__rebuildPend = {items: items};
  showSheet();
}
function confirmarReconstruccion(){
  const s = window.__rebuildPend; if(!s) return;
  closeMenu();
  toast("Reconstruyendo…");
  function chunk(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }

  // Paso 1: crear/actualizar las tarjetas (una por cada número distinto)
  const tarjetasUnicas = {};
  s.items.forEach(function(it){ if(it.tarjeta) tarjetasUnicas[it.tarjeta]=it.nombre; });
  const tarjChunks = chunk(Object.keys(tarjetasUnicas), 300);
  let ti=0;
  function pasoTarjetas(){
    if(ti>=tarjChunks.length){ pasoBienes(); return; }
    const batch = db.batch();
    tarjChunks[ti].forEach(function(num){
      const tid = tarjetaDocId(num);
      batch.set(db.collection("tarjetas").doc(tid), {
        numero:num, responsable:tarjetasUnicas[num]||"", activa:true,
        actualizada: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });
    ti++;
    batch.commit().then(pasoTarjetas).catch(function(e){ toast("Error creando tarjetas: "+(e.message||e)); });
  }
  // Paso 2: crear/actualizar los bienes con su tarjeta correcta
  const bienChunks = chunk(s.items, 300);
  let bi=0;
  function pasoBienes(){
    if(bi>=bienChunks.length){
      toast("✓ Reconstrucción completa: "+s.items.length+" bienes procesados");
      window.__rebuildPend=null; goHome(); return;
    }
    const batch = db.batch();
    bienChunks[bi].forEach(function(it){
      const tid = it.tarjeta? tarjetaDocId(it.tarjeta) : null;
      const datos = {
        codigo: it.codigo, codigoSiges: it.codigoSiges||"", descripcion: it.descripcion||it.codigo, valor: it.valor||0,
        tarjetaId: tid, tarjetaNumero: it.tarjeta||"", responsable: it.nombre||"",
        actualizado: firebase.firestore.FieldValue.serverTimestamp()
      };
      if(!BIENES[it.id]){
        datos.tipo="INDIVIDUAL"; datos.ubicacion=""; datos.estado=""; datos.existe="";
        datos.fechaVerificacion=""; datos.verificadoPor=""; datos.esNuevo=true;
        datos.observaciones=""; datos.notaDuplicado=""; datos.fotoBien=0;
      }
      batch.set(db.collection("bienes").doc(it.id), datos, {merge:true});
    });
    bi++;
    batch.commit().then(pasoBienes).catch(function(e){ toast("Error creando bienes: "+(e.message||e)); });
  }
  pasoTarjetas();
}

/* ================= ACTUALIZAR SOLO VALORES (no toca asignación ni verificación) ================= */
function actualizarValores(){

  if(typeof XLSX==="undefined"){ toast("No se pudo cargar el lector de Excel (revise internet)"); return; }
  window.__excelMode = "valores";
  document.getElementById("sheet").innerHTML = '<div class="grip"></div><h3>💲 Actualizar solo valores</h3>'

    +'<button class="act p" onclick="document.getElementById(\'excelin\').click()">📎 Elegir archivo Excel</button>'
    +'<button class="act o" onclick="closeMenu()">Cancelar</button>';
  showSheet();
}
function procesarActualizarValores(rows, nombreArchivo, nombreHoja, totalHojas){
  if(!rows.length){ toast("El archivo no tiene filas de datos"); return; }
  const {colCod, colDesc, colVal, colSiges} = leerColumnas(rows);
  if(!colCod){ toast("No encontré una columna de No. de Inventario en el archivo"); return; }
  if(!colVal){ toast("No encontré una columna de Valor/Monto en el archivo — nada que actualizar."); return; }

  const vistos = {};
  rows.forEach(function(r){

    const id = bienDocId(cod);
    if(vistos[id]) return; vistos[id]=1;
    if(!BIENES[id]){ sinCoincidir++; return; }
    const nuevoValor = Number(r[colVal])||0;
    cambios.push({
      id:id, codigo:cod, valorAnterior: Number(BIENES[id].valor||0), valorNuevo: nuevoValor,
      codigoSiges: colSiges? String(r[colSiges]==null?"":r[colSiges]).trim() : BIENES[id].codigoSiges||"",
      descripcion: colDesc? String(r[colDesc]==null?"":r[colDesc]).trim() : BIENES[id].descripcion||""
    });
  });
  if(cambios.length===0){ toast("Ningún código del archivo coincide con bienes del sistema."); return; }
  const totalAntes = cambios.reduce(function(s,c){return s+c.valorAnterior;},0);
  const totalDespues = cambios.reduce(function(s,c){return s+c.valorNuevo;},0);

    +'<div class="note" style="background:#EAF6EC;border-color:#BFE3C6">Total actual en el sistema: Q'+totalAntes.toLocaleString("es-GT",{minimumFractionDigits:2})+'<br>Total según el archivo: Q'+totalDespues.toLocaleString("es-GT",{minimumFractionDigits:2})+'</div>'
    +'<button class="act g" style="margin-top:12px" onclick="confirmarActualizarValores()">✓ Actualizar '+cambios.length+' valor(es)</button>'
    +'<button class="act o" onclick="closeMenu()">Cancelar</button>';

function procesarReinicio(rows, nombreArchivo, nombreHoja, totalHojas){
  if(!rows.length){ toast("El archivo no tiene filas de datos"); return; }
  const {colCod, colDesc, colVal, colNombre, colTarjeta, colSiges} = leerColumnas(rows);
  if(!colCod){ toast("No encontré una columna de No. de Inventario en el archivo"); return; }
  if(!colNombre || !colTarjeta){ toast("Este archivo no trae columnas de Nombre y Tarjeta, necesarias para reiniciar."); return; }
  const items = []; let invalidos=0;
  const vistos = {};
  rows.forEach(function(r){
    const cod = String(r[colCod]==null?"":r[colCod]).trim();
    if(!cod || !esCodigoValido(cod)){ invalidos++; return; }
    const id = bienDocId(cod);
    if(vistos[id]) return; vistos[id]=1;
    items.push({
      id:id, codigo:cod,
      codigoSiges: colSiges? String(r[colSiges]==null?"":r[colSiges]).trim() : "",
      descripcion: colDesc? String(r[colDesc]==null?"":r[colDesc]).trim() : "",
      valor: colVal? (Number(r[colVal])||0) : 0,
      nombre: String(r[colNombre]==null?"":r[colNombre]).trim(),
      tarjeta: String(r[colTarjeta]==null?"":r[colTarjeta]).trim()
    });
  });
  if(items.length===0){ toast("No se reconoció ningún bien válido en el archivo"); return; }
  const totalBienesActual = Object.keys(BIENES).length;
  const totalTarjetasActual = Object.keys(TARJETAS).length;
  const tarjetasUnicas = {};
  items.forEach(function(it){ if(it.tarjeta) tarjetasUnicas[it.tarjeta]=it.nombre; });

  let h = '<div class="grip"></div><h3>🧹 Última confirmación</h3>'
    +(totalHojas>1?'<div class="note">Se leyó la hoja "<b>'+esc(nombreHoja)+'</b>" (el archivo tiene '+totalHojas+' hojas).</div>':'')
    +'<div class="warnbox" style="font-size:14px;background:#FDE8E8;border-color:#F3B4B4;color:#7A1F1F">Se van a <b>ELIMINAR PERMANENTEMENTE</b>:<br>• '+totalBienesActual+' bien(es) actuales<br>• '+totalTarjetasActual+' tarjeta(s) actuales<br>• Todos los hallazgos</div>'
    +'<div class="note" style="background:#EAF6EC;border-color:#BFE3C6">Y se van a crear, limpios:<br>• <b>'+items.length+'</b> bien(es) del archivo "'+esc(nombreArchivo||"")+'"<br>• <b>'+Object.keys(tarjetasUnicas).length+'</b> tarjeta(s)'
    +(invalidos?('<br>('+invalidos+' fila(s) del archivo se ignoraron por no parecer números de inventario)'):'')+'</div>'
    +'<label style="margin-top:10px">Para confirmar, escriba BORRAR TODO</label>'
    +'<input type="text" id="resetConfirmTxt" placeholder="BORRAR TODO" style="width:100%;padding:11px;border:1.4px solid #E2E6EC;border-radius:9px;font-size:15px;text-transform:uppercase">'
    +'<button class="act g" style="margin-top:12px;background:#7A1F1F" onclick="confirmarReinicio()">🧹 Reiniciar y dejar solo estos '+items.length+' bienes</button>'
    +'<button class="act o" onclick="closeMenu()">Cancelar</button>';
  document.getElementById("sheet").innerHTML = h;
  window.__resetPend = {items: items, archivo: nombreArchivo||""};
  showSheet();
}
function confirmarReinicio(){
  const s = window.__resetPend; if(!s) return;
  const txt = (document.getElementById("resetConfirmTxt")||{}).value || "";
  if(txt.trim().toUpperCase()!=="BORRAR TODO"){ toast('Escriba exactamente "BORRAR TODO" para confirmar'); return; }
  if(!confirm("Última oportunidad para cancelar: se borrará TODO lo actual ("+Object.keys(BIENES).length+" bienes, "+Object.keys(TARJETAS).length+" tarjetas) y quedará solo lo del archivo. ¿Continuar?")) return;
  closeMenu();
  toast("Borrando todo…");
  function chunk(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }
  const idsBienes = Object.keys(BIENES);
  const idsTarjetas = Object.keys(TARJETAS);
  const idsHallazgos = Object.keys(HALLAZGOS);
  const borrarChunks = chunk(idsBienes,300).map(function(g){return{col:"bienes",ids:g};})
    .concat(chunk(idsTarjetas,300).map(function(g){return{col:"tarjetas",ids:g};}))
    .concat(chunk(idsHallazgos,300).map(function(g){return{col:"hallazgos",ids:g};}));
  let di=0;
  function pasoBorrar(){
    if(di>=borrarChunks.length){ pasoCrearTarjetas(); return; }
    const grp = borrarChunks[di]; const batch = db.batch();
    grp.ids.forEach(function(id){ batch.delete(db.collection(grp.col).doc(id)); });
    di++;
    batch.commit().then(pasoBorrar).catch(function(e){ toast("Error borrando: "+(e.message||e)); });
  }
  const tarjetasUnicas = {};
  s.items.forEach(function(it){ if(it.tarjeta) tarjetasUnicas[it.tarjeta]=it.nombre; });
  const tarjChunks = chunk(Object.keys(tarjetasUnicas), 300);
  let ti=0;
  function pasoCrearTarjetas(){
    if(ti>=tarjChunks.length){ pasoCrearBienes(); return; }
    const batch = db.batch();
    tarjChunks[ti].forEach(function(num){
      batch.set(db.collection("tarjetas").doc(tarjetaDocId(num)), {
        numero:num, responsable:tarjetasUnicas[num]||"", activa:true,
        creada: firebase.firestore.FieldValue.serverTimestamp(), actualizada: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });
    ti++;
    batch.commit().then(pasoCrearTarjetas).catch(function(e){ toast("Error creando tarjetas: "+(e.message||e)); });
  }
  const bienChunks = chunk(s.items, 300);
  let bi=0;
  function pasoCrearBienes(){
    if(bi>=bienChunks.length){ pasoLog(); return; }
    const batch = db.batch();
    bienChunks[bi].forEach(function(it){
      batch.set(db.collection("bienes").doc(it.id), {
        codigo: it.codigo, codigoSiges: it.codigoSiges||"", descripcion: it.descripcion||it.codigo, valor: it.valor||0,
        tarjetaId: it.tarjeta? tarjetaDocId(it.tarjeta) : null, tarjetaNumero: it.tarjeta||"", responsable: it.nombre||"",
        tipo:"INDIVIDUAL", ubicacion:"", estado:"", existe:"", fechaVerificacion:"", verificadoPor:"",
        esNuevo:true, observaciones:"", notaDuplicado:"", fotoBien:0,
        actualizado: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });
    bi++;
    batch.commit().then(pasoCrearBienes).catch(function(e){ toast("Error creando bienes: "+(e.message||e)); });
  }
  function pasoLog(){
    db.collection("movimientos").add({
      codigo:"", tipoMovimiento:"REINICIO_TOTAL", tarjetaAnteriorNumero:"", responsableAnterior:"",
      tarjetaNuevaNumero:"", responsableNuevo:"", estado:"", ubicacion:"",
      observaciones:"Reinicio total del sistema desde el archivo: "+(s.archivo||"")+". Quedaron "+s.items.length+" bienes.",
      fecha: firebase.firestore.FieldValue.serverTimestamp(), fechaTxt: today(), capturadoPor: META.by||""
    }).finally(function(){
      toast("✓ Reinicio completo: "+s.items.length+" bienes limpios");
      window.__resetPend=null; goHome();
    });
  }
  pasoBorrar();
}
function compressImage(file,cb){
  const rd=new FileReader();
  rd.onload=function(){ const img=new Image();
    img.onload=function(){
      const MAX=1100; let w=img.width,h=img.height;
      if(w>h && w>MAX){ h=Math.round(h*MAX/w); w=MAX; } else if(h>=w && h>MAX){ w=Math.round(w*MAX/h); h=MAX; }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      cb(cv.toDataURL("image/jpeg",0.65).split(",")[1]);
    };
    img.onerror=function(){ toast("Imagen no válida"); };
    img.src=rd.result;
  };
  rd.readAsDataURL(file);
}
function sanit(s){ return String(s||"").replace(/[^A-Za-z0-9._-]/g,"_").slice(0,40); }
function fotoName(k){
  if(k[0]==="B"){ const b=BIENES[k.slice(1)]; return "INV_"+sanit(b?b.codigo:k.slice(1))+"_T"+sanit(b?b.tarjetaNumero:"")+".jpg"; }
  if(k[0]==="H"){ return "HALLAZGO_"+sanit(k.slice(1))+".jpg"; }
  if(k==="Lses"){ return "LUGAR_"+sanit(curSes?curSes.loc:"")+"_"+sanit(curSes?curSes.persona:"")+"_"+Date.now()+".jpg"; }
  if(k[0]==="A"){ const it=curSes?curSes.items.find(function(x){return x.iid===k.slice(1);}):null; return "BIEN_"+sanit(it?it.codigo:k.slice(1))+"_"+sanit(curSes?curSes.persona:"")+".jpg"; }
  return "FOTO_"+sanit(k)+".jpg";
}
function marcarFotoFlag(k){
  if(k[0]==="B"){ db.collection("bienes").doc(k.slice(1)).update({fotoBien:1}).catch(function(){}); }
  else if(k[0]==="H"){ db.collection("hallazgos").doc(k.slice(1)).update({foto:1}).catch(function(){}); }
  else if(k[0]==="A" && curSes){ const it=curSes.items.find(function(x){return x.iid===k.slice(1);}); if(it) it.foto=1; }
  else if(k==="Lses" && curSes){ curSes.foto=1; }
}

    +'<div class="mitem" onclick="cerrarSesion()"><span class="ic">🚪</span><div><b>Cerrar sesión</b><small>'+esc(firebase.auth().currentUser?firebase.auth().currentUser.email:"")+'</small></div></div>'
    +'<div class="note">Los datos viven en la nube (Firestore) y se sincronizan solos entre dispositivos, aunque cierre la app. No hace falta exportar para no perderlos — el respaldo es solo un extra.</div>';

}

function copyGS(){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(GS_CODE).then(function(){ toast("Código copiado ✓"); }).catch(function(){ toast("Selecciónelo y copie manual"); });
  } else toast("Selecciónelo y copie manual");
}

function openExportBackup(){
  closeMenu();
  const head=["No. INVENTARIO","No. TARJETA","RESPONSABLE","EXISTE","ESTADO","UBICACION","OBSERVACIONES","FECHA","VERIFICADO POR"];
  function q(s){ s=(s==null?"":String(s)); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
  const rows=[head.map(q).join(",")];
  Object.values(BIENES).forEach(function(b){
    rows.push([b.codigo,b.tarjetaNumero,b.responsable,b.existe||"",b.estado||"",b.ubicacion||"",b.observaciones||"",b.fechaVerificacion||"",b.verificadoPor||""].map(q).join(","));
  });
  const csv = "\uFEFF"+rows.join("\r\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="respaldo_inventario_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a); a.click();
  setTimeout(function(){URL.revokeObjectURL(url); a.remove();},1500);
  toast("Respaldo descargado ✓");
}

/* ================= GENERAR EXCEL (libro completo) ================= */
function generarExcel(){
  closeMenu();
  if(typeof XLSX==="undefined"){ toast("No se pudo cargar el generador de Excel (revise internet)"); return; }
  toast("Preparando el libro de Excel…");
  db.collection("movimientos").get().then(function(snap){
    const movs = snap.docs.map(function(d){ return d.data(); });
    const wb = XLSX.utils.book_new();

    const base = Object.values(BIENES).sort(function(a,b){return (a.tarjetaNumero||"").localeCompare(b.tarjetaNumero||"");}).map(function(b){
      return {
        "No. Inventario": b.codigo, "No. Tarjeta": b.tarjetaNumero||"", "Responsable": b.responsable||"",
        "Descripción": b.descripcion||"", "Valor Q": Number(b.valor||0), "Tipo": b.tipo||"",
        "¿Existe?": b.existe||"", "Estado físico": b.estado||"", "Ubicación": b.ubicacion||"",
        "Observaciones": b.observaciones||"", "Fecha verificación": b.fechaVerificacion||"", "Verificado por": b.verificadoPor||"",
        "Descargado de tarjeta": b.tarjetaAnteriorNumero||"", "Responsable anterior": b.responsableAnterior||"",
        "Nota / revisar": b.notaDuplicado||""
      };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(base), "BASE");

    const tarjs = tarjetasActivas().map(function(t){
      const items = bienesDe(t.id);
      return { "No. Tarjeta": t.numero||"(pendiente)", "Responsable": t.responsable||"", "No. Empleado": t.empleado||"",
        "Correo": t.correo||"", "Puesto": t.puesto||"", "Tipo": t.tipo||"", "Bienes cargados": items.length,
        "Verificados": doneCount(items) };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tarjs), "TARJETAS");

    const mv = movs.sort(function(a,b){return (a.fechaTxt||"").localeCompare(b.fechaTxt||"");}).map(function(m){
      return { "Código": m.codigo||"", "Tipo movimiento": m.tipoMovimiento||"",
        "Tarjeta anterior": m.tarjetaAnteriorNumero||"", "Responsable anterior": m.responsableAnterior||"",
        "Tarjeta nueva": m.tarjetaNuevaNumero||"", "Responsable nuevo": m.responsableNuevo||"",
        "Existe": m.existe||"", "Estado": m.estado||"", "Ubicación": m.ubicacion||"",
        "Observaciones": m.observaciones||"", "Fecha": m.fechaTxt||"", "Capturado por": m.capturadoPor||"" };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(mv), "MOVIMIENTOS");

    const hz = Object.values(HALLAZGOS).map(function(z){
      return { "No. Inventario": z.inv||"S/N", "Cantidad": z.cant||1, "Descripción": z.desc||"",
        "Con quién / dónde": z.resp||"", "Ubicación": z.ubi||"", "Estado": z.est||"",
        "Observaciones": z.obs||"", "Fecha": z.f||"", "Anotado por": z.by||"" };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(hz), "HALLAZGOS");

    XLSX.writeFile(wb, "Inventario_AI_"+new Date().toISOString().slice(0,10)+".xlsx");
    toast("Excel generado ✓ (revise Descargas)");
  }).catch(function(e){
    toast("No se pudo generar: "+(e.message||e));
  });
}
