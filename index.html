    background:var(--fondo); color:#1a1f26; font-size:16px; line-height:1.4;
    padding-bottom:84px; -webkit-text-size-adjust:100%;}
  header{position:sticky; top:0; z-index:50; background:var(--azul); color:#fff;
    padding:10px 12px 8px; box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .hrow{display:flex; align-items:center; gap:10px;}
  .htitle{font-size:15px; font-weight:700; flex:1; line-height:1.15;}
  .htitle small{display:block; font-weight:400; font-size:11px; opacity:.8;}
  .hbtn{background:rgba(255,255,255,.16); border:none; color:#fff; font-size:19px;
    width:40px; height:40px; border-radius:9px; flex:none; position:relative;}
  .hbtn .dot{position:absolute; top:5px; right:5px; width:9px; height:9px; border-radius:50%;
    background:#FFB84D; border:1.5px solid var(--azul); display:none;}
  .hbtn .dot.on{display:block;}
  .pbarwrap{margin-top:8px; background:rgba(255,255,255,.18); border-radius:20px; height:20px; position:relative; overflow:hidden;}
  .pbar{background:linear-gradient(90deg,#3ea346,#57c95f); height:100%; width:0%; transition:width .3s; border-radius:20px;}
  .pbartxt{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:11.5px; font-weight:700; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .searchbar{padding:10px 12px 4px;}
  .searchbar input{width:100%; padding:12px 14px; border:1.5px solid var(--linea); border-radius:11px;
    font-size:16px; background:#fff; outline:none;}
  .searchbar input:focus{border-color:var(--azul2);}
  .backbtn{display:inline-flex; align-items:center; gap:6px; background:#fff; border:1.5px solid var(--linea);
    color:var(--azul); font-weight:600; font-size:14px; padding:9px 14px; border-radius:10px; margin:8px 0 2px;}
  .wrap{padding:6px 12px 0;}
  .hint{font-size:12.5px; color:var(--gris); margin:4px 2px 8px;}
  /* fila de responsables */
  .prow{background:var(--card); border:1px solid var(--linea); border-radius:12px; padding:12px 13px;
    margin-bottom:9px; display:flex; align-items:center; gap:11px; box-shadow:0 1px 2px rgba(20,30,60,.04);}
  .prow:active{background:#f6f8fc;}
  .pinfo{flex:1; min-width:0;}
  .pname{font-weight:700; font-size:15px; color:#17202e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pmeta{font-size:11.5px; color:var(--gris2); margin-top:2px;}
  .ring{--p:0; flex:none; width:46px; height:46px; border-radius:50%;
    background:conic-gradient(var(--verde) calc(var(--p)*1%), #E7ECF3 0);
    display:flex; align-items:center; justify-content:center; position:relative;}
  .ring::before{content:""; position:absolute; inset:5px; background:#fff; border-radius:50%;}
  .ringtxt{position:relative; font-size:10.5px; font-weight:800; color:var(--azul);}
  .chip{display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px;
    letter-spacing:.2px; vertical-align:middle;}
  .c-comp{background:#E7ECF6; color:#2F5496;}
  .c-bod{background:#EAE3F3; color:#6B3FA0;}
  .c-ind{background:#E9EDF2; color:#516074;}
  .c-dup{background:var(--naranjabg); color:var(--naranja); margin-left:5px;}
  .c-rev{background:var(--amarbg); color:var(--amar); margin-left:5px;}
  .c-hz{background:var(--naranjabg); color:var(--naranja);}
  /* fila especial hallazgos en home */
  .hzrow{background:linear-gradient(135deg,#FDF0E3,#FCEBDA); border:1.5px solid var(--naranjab);
    border-radius:12px; padding:13px; margin-bottom:11px; display:flex; align-items:center; gap:11px;}
  .hzrow .ic{font-size:24px; flex:none;}
  .hzrow b{color:#7A4508; font-size:14.5px;}
  .hzrow small{display:block; color:#9A6A33; font-size:11.5px; margin-top:1px;}
  /* tarjeta de bien */
  .item{background:var(--card); border:1px solid var(--linea); border-left:5px solid var(--linea);
    border-radius:12px; padding:12px 13px 13px; margin-bottom:11px; box-shadow:0 1px 3px rgba(20,30,60,.05);}
  .item.done-si{border-left-color:var(--verde);}
  .item.done-no{border-left-color:var(--rojo);}
  .item.done-nu{border-left-color:var(--naranja);}
  .item.hzitem{border-left-color:var(--naranja); background:#FFFDF9;}
  .itop{display:flex; align-items:baseline; gap:8px;}
  .inv{font-size:18px; font-weight:800; color:#141a24; letter-spacing:.3px;}
  .val{margin-left:auto; font-size:13px; font-weight:700; color:var(--teal); white-space:nowrap;}
  .desc{font-size:13.5px; color:#2c333d; margin:6px 0 2px;}
  .ochips{margin:5px 0 2px;}
  .powner{font-size:11.5px; color:var(--gris2); margin-top:3px;}
  .bgrp{display:flex; gap:7px; margin-top:10px;}
  .bgrp.estado{margin-top:7px;}
  .btn{flex:1; border:1.6px solid var(--linea); background:#fff; color:#333; font-size:14px; font-weight:700;
    padding:12px 4px; border-radius:10px; text-align:center; line-height:1.15; transition:.12s;}
  .btn:active{transform:scale(.97);}
  .btn small{display:block; font-size:10px; font-weight:600; opacity:.7;}
  .btn.est{font-size:12.5px; padding:10px 3px;}
  .b-si.sel{background:var(--verde); border-color:var(--verde); color:#fff;}
  .b-no.sel{background:var(--rojo); border-color:var(--rojo); color:#fff;}
  .b-nu.sel{background:var(--naranja); border-color:var(--naranja); color:#fff;}
  .e-bueno.sel{background:var(--verde); border-color:var(--verde); color:#fff;}
  .e-regular.sel{background:#B08900; border-color:#B08900; color:#fff;}
  .e-malo.sel{background:var(--naranja); border-color:var(--naranja); color:#fff;}
  .e-baja.sel{background:var(--rojo); border-color:var(--rojo); color:#fff;}
  /* fila foto + extra */
  .tools{display:flex; gap:8px; align-items:center; margin-top:9px; flex-wrap:wrap;}
  .moretog{font-size:12.5px; color:var(--azul2); font-weight:600;}
  .fotobtn{border:1.6px dashed #B8C4D4; background:#F7FAFE; color:var(--azul2); font-size:12.5px; font-weight:700;
    padding:8px 12px; border-radius:9px;}
  .fotobtn.has{border-style:solid; background:var(--verdebg); border-color:var(--verdeb); color:var(--verde);}
  .thumb{width:44px; height:44px; border-radius:8px; object-fit:cover; border:1.5px solid var(--linea);}
  .extra{display:none; margin-top:9px;}
  .extra.open{display:block;}
  .extra label,.fform label{font-size:11px; color:var(--gris); font-weight:600; display:block; margin:8px 0 3px;}
  .extra input,.fform input,.fform select{width:100%; padding:10px 11px; border:1.4px solid var(--linea);
    border-radius:9px; font-size:15px; outline:none; background:#fff;}
  .extra input:focus,.fform input:focus{border-color:var(--azul2);}
  .stamp{font-size:10.5px; color:var(--gris2); margin-top:8px;}
  .filters{display:flex; gap:7px; margin:2px 0 10px;}
  .fp{flex:1; text-align:center; font-size:12.5px; font-weight:700; padding:8px 4px; border-radius:9px;
    border:1.5px solid var(--linea); background:#fff; color:var(--gris);}
  .fp.on{background:var(--azul); border-color:var(--azul); color:#fff;}
  .empty{text-align:center; color:var(--gris2); font-size:14px; padding:40px 20px;}
  /* sheet / overlay */
  .overlay{position:fixed; inset:0; background:rgba(10,15,25,.5); z-index:100; display:none;}
  .overlay.show{display:block;}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:101; background:#fff; border-radius:18px 18px 0 0;
    padding:8px 16px 24px; transform:translateY(105%); transition:transform .25s; max-height:90vh; overflow:auto;}
  .sheet.show{transform:translateY(0);}
  .grip{width:40px; height:4px; background:#D5DAE2; border-radius:3px; margin:8px auto 12px;}
  .sheet h3{margin:2px 0 12px; font-size:16px; color:var(--azul);}
  .mitem{display:flex; align-items:center; gap:12px; padding:14px 6px; border-top:1px solid var(--linea); font-size:15px;}
  .mitem .ic{font-size:20px; width:26px; text-align:center;}
  .mitem b{font-weight:600;}
  .mitem small{display:block; color:var(--gris2); font-size:11.5px; font-weight:400;}
  .sheet .fld{margin:6px 0 2px;}
  .sheet .fld label{font-size:12px; color:var(--gris); font-weight:600;}
  .sheet .fld input{width:100%; padding:11px 13px; border:1.5px solid var(--linea); border-radius:10px; font-size:16px; margin-top:5px;}
  .act{display:block; width:100%; text-align:center; padding:14px; border-radius:11px; font-size:15px; font-weight:700; border:none; margin-top:12px;}
  .act.p{background:var(--azul); color:#fff;}
  .act.g{background:var(--verde); color:#fff;}
  .act.n{background:var(--naranja); color:#fff;}
  .act.o{background:#fff; color:var(--rojo); border:1.5px solid var(--rojob);}
  .act.q{background:#EAEEF4; color:var(--azul);}
  .act[disabled]{opacity:.5;}
  textarea.csv{width:100%; height:130px; font-family:monospace; font-size:11px; border:1.5px solid var(--linea);
    border-radius:10px; padding:10px; margin-top:6px;}
  .note{font-size:12px; color:var(--gris); background:var(--amarbg); border-radius:9px; padding:10px 12px; margin-top:10px; line-height:1.45;}
  .note.b{background:#EAF1FB; color:#2B4A75;}
  .steps{font-size:13px; color:#333; margin:8px 0 0; padding-left:18px; line-height:1.55;}
  .steps li{margin-bottom:7px;}
  .okbadge{display:inline-block; font-size:11px; font-weight:800; padding:3px 10px; border-radius:20px;}
  .ok-on{background:var(--verdebg); color:var(--verde);}
  .ok-off{background:#EDEFF3; color:var(--gris2);}
  .toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:#222b38; color:#fff; padding:11px 18px; border-radius:24px; font-size:13.5px; font-weight:600;
    z-index:200; transition:.25s; pointer-events:none; max-width:90%; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .fabbar{position:fixed; left:0; right:0; bottom:0; z-index:40; background:#fff; border-top:1px solid var(--linea);
    padding:9px 10px calc(9px + env(safe-area-inset-bottom)); display:flex; gap:8px; box-shadow:0 -2px 10px rgba(0,0,0,.06);}
  .fabbar button{flex:1; border:none; border-radius:11px; font-size:13.5px; font-weight:700; padding:13px 4px;}
  .fb-exp{background:var(--verde); color:#fff;}
  .fb-home{background:#EAEEF4; color:var(--azul);}
  .fb-hz{background:var(--naranja); color:#fff;}
  /* visor de foto */
  .pmodal{position:fixed; inset:0; z-index:150; background:rgba(8,12,20,.92); display:none;
    flex-direction:column; align-items:center; justify-content:center; padding:16px;}
  .pmodal.show{display:flex;}
  .pmodal img{max-width:100%; max-height:70vh; border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,.6);}
  .pmodal .prow2{display:flex; gap:10px; margin-top:16px; width:100%; max-width:420px;}
  .pmodal button{flex:1; padding:13px; border-radius:11px; border:none; font-size:14px; font-weight:700;}
  .pm-rep{background:#fff; color:var(--azul);}
  .pm-del{background:var(--rojo); color:#fff;}
  .pm-cls{background:rgba(255,255,255,.2); color:#fff;}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="htitle">Inventario Físico<small>Auditoría Interna – IGSS</small></div>
    <button class="hbtn" onclick="openDrive()" title="Drive">☁️<span class="dot" id="drivedot"></span></button>
    <button class="hbtn" onclick="openMenu()">☰</button>
  </div>
  <div class="pbarwrap"><div class="pbar" id="pbar"></div><div class="pbartxt" id="pbartxt">0 / 0</div></div>
</header>

<div class="searchbar">
  <input id="search" type="search" inputmode="search" placeholder="🔍 Buscar por nombre, No. o descripción…"
    oninput="onSearch(this.value)" autocomplete="off">
</div>

<div id="view" class="wrap"></div>

<div class="fabbar" id="fabbar">
  <button class="fb-home" onclick="goHome()">👥 Responsables</button>
  <button class="fb-hz" onclick="newHallazgo()">➕ Hallazgo</button>
  <button class="fb-exp" onclick="openExport()">⬇️ Guardar</button>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<!-- visor de foto -->
<div class="pmodal" id="pmodal">
  <img id="pmimg" alt="foto">
  <div class="prow2">
    <button class="pm-rep" onclick="retakePhoto()">📷 Repetir</button>
    <button class="pm-del" onclick="deletePhoto()">🗑️ Eliminar</button>
    <button class="pm-cls" onclick="closePhoto()">Cerrar</button>
  </div>
</div>

<!-- cámara global -->
<input type="file" id="camin" accept="image/*" capture="environment" hidden>

/* ---------- persistencia ---------- */
function load(){
  try{
    let r=JSON.parse(localStorage.getItem(KEY));
    if(!r){ const v1=JSON.parse(localStorage.getItem(KEY_OLD)); if(v1){ r={s:v1.s||{},m:v1.m||{},h:[]}; } }
    if(r){ ST=r.s||{}; META=Object.assign(META,r.m||{}); HZ=r.h||[]; SES=r.g||[]; }
  }catch(e){}
}
function save(){
  META.ts=new Date().toISOString();
  try{ localStorage.setItem(KEY, JSON.stringify({s:ST,m:META,h:HZ,g:SES})); }
  catch(e){ toast("⚠️ Memoria llena: exporte su avance"); }
  updateDot();
}
function today(){ const d=new Date(); return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear(); }

/* ---------- helpers ---------- */
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function money(v){ return "Q"+Number(v||0).toLocaleString("es-GT",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function chipTipo(tp){ if((tp||"").indexOf("MPUTO")>=0)return '<span class="chip c-comp">CÓMPUTO</span>';
  if((tp||"").indexOf("BODEGA")>=0||(tp||"").indexOf("GENERAL")>=0)return '<span class="chip c-bod">BODEGA</span>';
  return '<span class="chip c-ind">INDIVIDUAL</span>'; }
function groups(){
  const g={};
  DATA.forEach((it,i)=>{ (g[it.t]=g[it.t]||{t:it.t,n:it.n,tp:it.tp,q:it.q,p:it.p,ids:[]}).ids.push(i); });
  return Object.values(g);
}
function doneCount(ids){ return ids.filter(i=>ST[i]&&ST[i].x).length; }
function totalDone(){ let n=0; for(const k in ST){ if(ST[k]&&ST[k].x) n++; } return n; }
function refreshProgress(){
  const done=totalDone(), tot=DATA.length, pct=tot?Math.round(done/tot*100):0;
  document.getElementById("pbar").style.width=pct+"%";
  document.getElementById("pbartxt").textContent=done+" / "+tot+"  ("+pct+"%)"+(HZ.length?"  ·  "+HZ.length+" hallazgo(s)":"");
}

/* ---------- navegación / render ---------- */
function goHome(){ mode={view:"home",tarjeta:null,filter:"todos",q:""};
  document.getElementById("search").value=""; render(); window.scrollTo(0,0); }
function render(){
  const v=document.getElementById("view");
  if(mode.q){ return renderSearch(v); }
  if(mode.view==="person"){ return renderPerson(v); }
  if(mode.view==="hall"){ return renderHall(v); }
  if(mode.view==="ses"){ return renderSession(v); }
  const gs=groups();
  let h='<div class="hzrow" onclick="openHall()"><span class="ic">📸</span>'
    +'<div style="flex:1"><b>Hallazgos: bienes encontrados sin tarjeta</b>'

    +'<div style="color:#C99B62;font-size:20px">›</div></div>';
  h+='<div class="hzrow" style="background:linear-gradient(135deg,#E9EEF7,#DDE6F3);border-color:#B9C6DE" onclick="openSessions()"><span class="ic">🧍</span>'
    +'<div style="flex:1"><b style="color:#25406B">Levantar por persona (reasignación)</b>'
    +'<small style="color:#5E7196">Escriba los números que tiene una persona; la app ve de quién estaban y arma el traslado'+(SES.length?' · '+SES.length+' toma(s)':'')+'</small></div>'
    +'<div style="color:#9FB0CC;font-size:20px">›</div></div>';
  h+='<div class="hint">Toque un responsable para verificar sus bienes. '+gs.length+' tarjetas · '+DATA.length+' bienes.</div>';
  gs.forEach(g=>{
    const d=doneCount(g.ids), t=g.ids.length, p=t?Math.round(d/t*100):0;
    h+='<div class="prow" onclick="openPerson(\''+esc(g.t)+'\')">'
      +'<div class="ring" style="--p:'+p+'"><span class="ringtxt">'+d+'/'+t+'</span></div>'
      +'<div class="pinfo"><div class="pname">'+esc(g.n||"(sin nombre)")+'</div>'
      +'<div class="pmeta">Tarjeta '+esc(g.t)+' '+chipTipo(g.tp)
      +(g.q==="REVISAR"?' <span class="chip c-rev">REVISAR</span>':'')+'</div></div>'
      +'<div style="color:#B8C0CC;font-size:20px">›</div></div>';
  });

}
function openPerson(t){ mode={view:"person",tarjeta:t,filter:"todos",q:""};
  document.getElementById("search").value=""; render(); window.scrollTo(0,0); }
function renderPerson(v){
  const ids=DATA.map((it,i)=>i).filter(i=>DATA[i].t===mode.tarjeta);
  const g=DATA[ids[0]];
  const d=doneCount(ids), t=ids.length;
  let show=ids;
  if(mode.filter==="pend") show=ids.filter(i=>!(ST[i]&&ST[i].x));
  if(mode.filter==="list") show=ids.filter(i=>ST[i]&&ST[i].x);
  let h='<button class="backbtn" onclick="goHome()">‹ Responsables</button>';
  h+='<div style="margin:6px 2px 2px"><div style="font-size:18px;font-weight:800;color:#17202e">'+esc(g.n||"(sin nombre)")+'</div>'
    +'<div style="font-size:12.5px;color:#8A929C;margin-top:2px">Tarjeta '+esc(g.t)+' · '+esc(g.p||"")+' '+chipTipo(g.tp)+'</div></div>';
  h+='<div class="filters">'
    +'<div class="fp '+(mode.filter==="todos"?"on":"")+'" onclick="setFilter(\'todos\')">Todos ('+t+')</div>'
    +'<div class="fp '+(mode.filter==="pend"?"on":"")+'" onclick="setFilter(\'pend\')">Pendientes ('+(t-d)+')</div>'
    +'<div class="fp '+(mode.filter==="list"?"on":"")+'" onclick="setFilter(\'list\')">Hechos ('+d+')</div></div>';
  if(show.length===0){ h+='<div class="empty">✓ No hay bienes en este filtro.</div>'; v.innerHTML=h; loadThumbs(); return; }
  h+=show.map(i=>itemCard(i)).join("");
  v.innerHTML=h; loadThumbs();
}
function setFilter(f){ mode.filter=f; render(); }
function onSearch(q){ q=q.trim(); mode.q=q; render(); }
function renderSearch(v){
  const q=mode.q.toLowerCase();
  const ids=DATA.map((it,i)=>i).filter(i=>{
    const it=DATA[i];
    return String(it.c).toLowerCase().includes(q) || (it.d||"").toLowerCase().includes(q)
        || (it.n||"").toLowerCase().includes(q) || String(it.t).toLowerCase().includes(q);
  });
  const hz=HZ.filter(z=>(z.inv||"").toLowerCase().includes(q)||(z.desc||"").toLowerCase().includes(q));
  let h='<div class="hint">'+(ids.length+hz.length)+' resultado(s) para “'+esc(mode.q)+'”.</div>';
  if(hz.length) h+=hz.map(z=>hallCard(z)).join("");
  if(ids.length===0 && hz.length===0) h+='<div class="empty">Sin coincidencias.<br><br>Si el bien no está en el listado,<br>use 🧍 Levantar por persona o ➕ Hallazgo.</div>';
  else h+=ids.slice(0,200).map(i=>itemCard(i,true)).join("");
  if(ids.length>200) h+='<div class="hint">Mostrando 200 de '+ids.length+'. Afine la búsqueda.</div>';
  v.innerHTML=h; loadThumbs();
}

/* ---------- tarjeta de bien ---------- */
function itemCard(i, showOwner){
  const it=DATA[i], s=ST[i]||{};
  const cls = s.x==="SÍ"?"done-si":s.x==="NO"?"done-no":s.x==="NO UBICADO"?"done-nu":"";
  let dup = it.du?'<span class="chip c-dup">⚠ EN OTRA TARJ: '+esc(it.du)+'</span>':'';
  let rev = it.q==="REVISAR"?'<span class="chip c-rev">REVISAR</span>':'';
  let owner = showOwner?'<div class="powner">'+esc(it.n)+' · Tarj. '+esc(it.t)+'</div>':'';
  return '<div class="item '+cls+'" id="it'+i+'">'
    +'<div class="itop"><span class="inv">'+esc(it.c)+'</span><span class="val">'+money(it.v)+'</span></div>'
    +'<div class="ochips">'+chipTipo(it.tp)+dup+rev+'</div>'
    +'<div class="desc">'+esc(it.d)+'</div>'
    +owner
    +'<div class="bgrp">'
      +'<button class="btn b-si '+(s.x==="SÍ"?"sel":"")+'" onclick="mark('+i+',\'x\',\'SÍ\')">✓ SÍ<small>existe</small></button>'
      +'<button class="btn b-no '+(s.x==="NO"?"sel":"")+'" onclick="mark('+i+',\'x\',\'NO\')">✗ NO<small>no está</small></button>'
      +'<button class="btn b-nu '+(s.x==="NO UBICADO"?"sel":"")+'" onclick="mark('+i+',\'x\',\'NO UBICADO\')">? NO<small>ubicado</small></button>'
    +'</div>'
    +'<div class="bgrp estado" style="'+(s.x==="SÍ"?"":"display:none")+'">'
      +'<button class="btn est e-bueno '+(s.s==="BUENO"?"sel":"")+'" onclick="mark('+i+',\'s\',\'BUENO\')">Bueno</button>'
      +'<button class="btn est e-regular '+(s.s==="REGULAR"?"sel":"")+'" onclick="mark('+i+',\'s\',\'REGULAR\')">Regular</button>'
      +'<button class="btn est e-malo '+(s.s==="MALO"?"sel":"")+'" onclick="mark('+i+',\'s\',\'MALO\')">Malo</button>'
      +'<button class="btn est e-baja '+(s.s==="PARA BAJA"?"sel":"")+'" onclick="mark('+i+',\'s\',\'PARA BAJA\')">Baja</button>'
    +'</div>'
    +'<div class="tools">'
      +'<button class="fotobtn" id="fb_B'+i+'" onclick="takePhoto(\'B'+i+'\')">📷 Foto</button>'
      +'<img class="thumb" id="th_B'+i+'" style="display:none" onclick="viewPhoto(\'B'+i+'\')">'
      +'<span class="moretog" onclick="toggleExtra('+i+')">＋ Ubicación / observación</span>'
    +'</div>'
    +'<div class="extra" id="ex'+i+'">'
      +'<label>Ubicación física real</label><input type="text" value="'+esc(s.u||"")+'" '
        +'oninput="mark('+i+',\'u\',this.value,true)" placeholder="Ej. Oficina 3, escritorio ventana">'
      +'<label>Observaciones</label><input type="text" value="'+esc(s.o||"")+'" '
        +'oninput="mark('+i+',\'o\',this.value,true)" placeholder="Ej. sin serie visible / prestado a…">'
    +'</div>'
    +(s.f?'<div class="stamp">✓ '+esc(s.f)+(s.by?" · "+esc(s.by):"")+'</div>':'')
    +'</div>';
}
function toggleExtra(i){ const e=document.getElementById("ex"+i); if(e) e.classList.toggle("open"); }
function mark(i, field, val, silent){
  const s = ST[i] || (ST[i]={});
  if((field==="x"||field==="s") && s[field]===val){ delete s[field]; }
  else { s[field]=val; }
  if(field==="x" && s.x){ if(!s.f) s.f=today(); s.by=META.by||s.by; }
  s.dv=1; // pendiente de enviar a Drive
  if(!s.x && !s.s && !s.u && !s.o){ delete ST[i]; }
  save(); scheduleSync();
  if(!silent){
    const el=document.getElementById("it"+i);
    if(el){ el.outerHTML=itemCard(i, mode.q?true:false); loadThumbs(); }
  }
  refreshProgress();
  if(field==="x" && mode.view==="home") render();
}

/* ================= FOTOS (cámara + IndexedDB) ================= */
let idb=null;
function openIDB(){ return new Promise((res,rej)=>{
  if(idb) return res(idb);
  const rq=indexedDB.open("inv_fotos_ai",1);
  rq.onupgradeneeded=e=>{ e.target.result.createObjectStore("fotos",{keyPath:"k"}); };
  rq.onsuccess=e=>{ idb=e.target.result; res(idb); };
  rq.onerror=e=>rej(e);
});}
function fotoPut(rec){ return openIDB().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction("fotos","readwrite"); tx.objectStore("fotos").put(rec);
  tx.oncomplete=res; tx.onerror=rej; }));}
function fotoGet(k){ return openIDB().then(db=>new Promise((res,rej)=>{
  const rq=db.transaction("fotos").objectStore("fotos").get(k);
  rq.onsuccess=()=>res(rq.result||null); rq.onerror=rej; }));}
function fotoDel(k){ return openIDB().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction("fotos","readwrite"); tx.objectStore("fotos").delete(k);
  tx.oncomplete=res; tx.onerror=rej; }));}
function fotoAll(){ return openIDB().then(db=>new Promise((res,rej)=>{

let camTarget=null;
function takePhoto(k){ camTarget=k; const c=document.getElementById("camin"); c.value=""; c.click(); }
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("camin").addEventListener("change",function(){
    const f=this.files&&this.files[0]; if(!f||!camTarget) return;
    compressImage(f, b64=>{
      const name=fotoName(camTarget);
      fotoPut({k:camTarget,b64:b64,name:name,sent:0,ts:Date.now()}).then(()=>{
        if(camTarget[0]==="H"){ const z=HZ.find(x=>"H"+x.id===camTarget); if(z){z.foto=1; z.dirty=1;} save(); }
        else if(camTarget[0]==="L"){ const ss=getSes(camTarget.slice(1)); if(ss){ss.foto=1; ss.dirty=1;} save(); }
        else if(camTarget[0]==="A"){ const r=getItem(Number(camTarget.slice(1))); if(r){r.it.foto=1; r.s.dirty=1;} save(); }
        toast("Foto guardada ✓"); refreshFotoUI(camTarget); updateDot(); scheduleSync();
      }).catch(()=>toast("No se pudo guardar la foto"));
    });
  });
});
function compressImage(file, cb){
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image();
    img.onload=()=>{
      const MAX=1100; let w=img.width,h=img.height;
      if(w>h && w>MAX){ h=Math.round(h*MAX/w); w=MAX; } else if(h>=w && h>MAX){ w=Math.round(w*MAX/h); h=MAX; }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      const durl=cv.toDataURL("image/jpeg",0.65);
      cb(durl.split(",")[1]);
    };
    img.onerror=()=>toast("Imagen no válida");
    img.src=rd.result;
  };
  rd.readAsDataURL(file);
}
function sanit(s){ return String(s||"").replace(/[^A-Za-z0-9._-]/g,"_").slice(0,40); }
function fotoName(k){
  if(k[0]==="B"){ const it=DATA[Number(k.slice(1))]; return "INV_"+sanit(it.c)+"_T"+sanit(it.t)+".jpg"; }
  if(k[0]==="H"){ return "HALLAZGO_"+sanit(k.slice(1))+".jpg"; }
  if(k[0]==="L"){ const ss=getSes(k.slice(1)); return "LUGAR_"+sanit(ss?ss.loc:"")+"_"+sanit(ss?ss.person:"")+"_"+k.slice(1)+".jpg"; }
  if(k[0]==="A"){ const r=getItem(Number(k.slice(1))); return "BIEN_"+sanit(r?r.it.inv:k.slice(1))+"_"+sanit(r?r.s.person:"")+".jpg"; }
  return "FOTO_"+sanit(k)+".jpg";
}
function refreshFotoUI(k){
  fotoGet(k).then(r=>{
    const btn=document.getElementById("fb_"+k), th=document.getElementById("th_"+k);
    if(btn){ btn.classList.toggle("has",!!r); btn.textContent=r?"📷 ✓":"📷 Foto"; }
    if(th){ if(r){ th.src="data:image/jpeg;base64,"+r.b64; th.style.display=""; } else th.style.display="none"; }
  });
}
function loadThumbs(){
  document.querySelectorAll("[id^='fb_']").forEach(el=>refreshFotoUI(el.id.slice(3)));
}
let photoKey=null;
function viewPhoto(k){ photoKey=k;
  fotoGet(k).then(r=>{ if(!r) return;
    document.getElementById("pmimg").src="data:image/jpeg;base64,"+r.b64;
    document.getElementById("pmodal").classList.add("show"); });
}
function closePhoto(){ document.getElementById("pmodal").classList.remove("show"); }
function retakePhoto(){ closePhoto(); if(photoKey) takePhoto(photoKey); }
function deletePhoto(){ if(!photoKey) return;
  fotoDel(photoKey).then(()=>{ if(photoKey[0]==="H"){ const z=HZ.find(x=>"H"+x.id===photoKey); if(z){z.foto=0; z.dirty=1;} save(); }
    closePhoto(); refreshFotoUI(photoKey); toast("Foto eliminada"); });
}

let curSes=null;
function getSes(id){ if(curSes && curSes.id===id) return curSes; return SES.find(function(x){return x.id===id;}); }
function getItem(iid){ const all=(curSes?[curSes]:[]).concat(SES); for(const s of all){ const it=(s.items||[]).find(function(x){return x.iid===iid;}); if(it) return {s:s,it:it}; } return null; }
function openSessions(){ mode={view:"ses",tarjeta:null,filter:"todos",q:""}; document.getElementById("search").value=""; render(); window.scrollTo(0,0); }
function newSession(){ META.seqS=(META.seqS||0)+1; curSes={id:"S"+String(META.seqS).padStart(3,"0"),person:"",emp:"",loc:"",foto:0,fecha:today(),by:(META.by||""),items:[],dirty:1}; openSessions(); }
function cancelSession(){ curSes=null; openSessions(); }
function setSesField(f,val){ if(!curSes)return; curSes[f]=val; curSes.dirty=1; render(); }
function personasDatalist(){ const seen={}; let o=""; groups().forEach(function(g){ if(g.n && !seen[g.n]){ seen[g.n]=1; o+='<option value="'+esc(g.n)+'"></option>'; } }); return o; }
function addInv(){
  if(!curSes) return;
  const el=document.getElementById("invin"); let num=(el?el.value:"").trim(); if(!num){ return; }
  const matches=findByInv(num).map(function(j){ return {j:j,n:DATA[j].n,t:DATA[j].t,d:DATA[j].d}; });
  META.seqI=(META.seqI||0)+1;
  curSes.items.unshift({iid:META.seqI, inv:num, desc:(matches.length?matches[0].d:""), isNew:matches.length===0, matches:matches.map(function(m){return {n:m.n,t:m.t};}), estado:"", obs:"", foto:0});
  curSes.dirty=1; el.value=""; save(); render();
  setTimeout(function(){ const i2=document.getElementById("invin"); if(i2) i2.focus(); },40);
}
function sesItemEstado(iid,val){ const r=getItem(iid); if(!r)return; r.it.estado=(r.it.estado===val?"":val); r.s.dirty=1; save(); render(); }
function sesItemObs(iid,val){ const r=getItem(iid); if(!r)return; r.it.obs=val; r.s.dirty=1; save(); }
function delSesItem(iid){ const r=getItem(iid); if(!r)return; r.s.items=r.s.items.filter(function(x){return x.iid!==iid;}); r.s.dirty=1; fotoDel("A"+iid); save(); render(); }
function saveSession(){
  if(!curSes){ return; }
  if(!curSes.person.trim()){ toast("Escriba con quién está (persona)"); return; }
  if(!curSes.loc){ toast("Elija la ubicación"); return; }
  if(curSes.items.length===0){ toast("Agregue al menos un número de bien"); return; }
  curSes.items.forEach(function(it){
    if(it.isNew) return;
    findByInv(it.inv).forEach(function(j){
      const transfer = DATA[j].n && DATA[j].n!==curSes.person;
      ST[j]={x:"SÍ", s:it.estado||"", u:curSes.loc,
             o:("Físicamente con: "+curSes.person+(transfer?" (traslado de "+DATA[j].n+")":"")),
             f:curSes.fecha, by:curSes.by, dv:1};
    });
  });
  if(!SES.includes(curSes)) SES.unshift(curSes);
  curSes.dirty=1; curSes=null; save(); scheduleSync(); refreshProgress(); openSessions();
  toast("Toma guardada ✓ Reasignación lista para el Excel");
}
function editSession(id){ const sx=SES.find(function(x){return x.id===id;}); if(!sx)return; curSes=sx; openSessions(); }
function delSession(id){ if(!confirm("¿Borrar esta toma completa?"))return; const sx=SES.find(function(x){return x.id===id;}); if(sx){ (sx.items||[]).forEach(function(it){fotoDel("A"+it.iid);}); fotoDel("L"+sx.id); } SES=SES.filter(function(x){return x.id!==id;}); save(); render(); toast("Toma borrada"); }

  h+='</div>';
  h+='<div class="tools" style="margin-top:10px"><button class="fotobtn" id="fb_L'+s.id+'" onclick="takePhoto(\'L'+s.id+'\')">📷 Foto del lugar</button>';
  h+='<img class="thumb" id="th_L'+s.id+'" style="display:none" onclick="viewPhoto(\'L'+s.id+'\')"></div>';

function sesCard(s){
  const n=(s.items||[]).length;
  const tr=(s.items||[]).filter(function(x){return !x.isNew && x.matches.some(function(m){return m.n!==s.person;});}).length;

    +'<div class="itop"><span class="inv" style="font-size:16px">'+esc(s.person||"(sin nombre)")+'</span></div>'
    +'<div class="powner">'+esc(s.loc||"(sin ubicación)")+' · '+n+' bien(es)'+(tr?' · '+tr+' traslado(s)':'')+(nu?' · '+nu+' nuevo(s)':'')+'</div>'

  +'</div>';
}

'      ["ID","No. INVENTARIO","DESCRIPCION","QUIEN LO TENIA (CARGO)","No. TARJETA ORIGEN","AHORA LO TIENE (FISICO)","No. EMPLEADO","UBICACION","SITUACION","ESTADO","OBSERVACIONES","FOTO BIEN","FOTO LUGAR","FECHA","CAPTURADO POR","ACTUALIZADO"], d.rows, 1); }\n'+
'    else if(d.type === "foto"){ guardarFoto(d.name, d.b64); }\n'+
'    return _out({ok:true});\n'+
'  }catch(err){ return _out({ok:false, error:String(err)}); }\n'+
'}\n'+
'function upsert(ss, nombre, encabezados, filas, nclave){\n'+
'  var sh = ss.getSheetByName(nombre) || ss.insertSheet(nombre);\n'+
'  if(sh.getLastRow() === 0){ sh.appendRow(encabezados);\n'+
'    sh.getRange(1,1,1,encabezados.length).setFontWeight("bold").setBackground("#1F3864").setFontColor("#FFFFFF"); }\n'+
'  var datos = sh.getLastRow()>1 ? sh.getRange(2,1,sh.getLastRow()-1,nclave).getValues() : [];\n'+
'  var idx = {};\n'+
'  for(var r=0; r<datos.length; r++){ idx[datos[r].slice(0,nclave).join("||")] = r+2; }\n'+
'  var ahora = Utilities.formatDate(new Date(), Session.getScriptTimeZone(), "dd/MM/yyyy HH:mm");\n'+
'  filas.forEach(function(f){\n'+
'    f = f.concat([ahora]);\n'+
'    var k = f.slice(0,nclave).join("||");\n'+
'    if(idx[k]){ sh.getRange(idx[k],1,1,f.length).setValues([f]); }\n'+
'    else { sh.appendRow(f); idx[k] = sh.getLastRow(); }\n'+
'  });\n'+
'}\n'+
'function guardarFoto(nombre, b64){\n'+
'  var it = DriveApp.getFoldersByName(CARPETA_FOTOS);\n'+
'  var fol = it.hasNext() ? it.next() : DriveApp.createFolder(CARPETA_FOTOS);\n'+
'  var viejos = fol.getFilesByName(nombre);\n'+
'  while(viejos.hasNext()){ viejos.next().setTrashed(true); }\n'+
'  fol.createFile(Utilities.newBlob(Utilities.base64Decode(b64), "image/jpeg", nombre));\n'+
'}\n'+
'function _out(o){ return ContentService.createTextOutput(JSON.stringify(o)).setMimeType(ContentService.MimeType.JSON); }';

async function doPush(silent){
  if(_pushing || !META.drive) return;
  if(!navigator.onLine){ if(!silent) toast("Sin conexión: se enviará al reconectar"); return; }
  _pushing=true; let sent=0;
  try{
    const rows=[];
    for(const k in ST){ const s=ST[k]; if(!s||!s.dv) continue; const it=DATA[k];
      rows.push([it.c,it.t,s.x||"",s.s||"",s.u||"",s.o||"",s.f||"",s.by||""]); }
    if(rows.length){ if(!silent) toast("Enviando verificación ("+rows.length+")…");
      await drivePost({type:"verif",rows:rows});
      for(const k in ST){ if(ST[k]) delete ST[k].dv; } sent+=rows.length; save(); }
    const hrows=HZ.filter(z=>z.dirty).map(z=>[z.id,z.inv||"",z.cant,z.desc,z.est||"",z.ubi||"",z.resp||"",z.emp||"",z.obs||"",z.f,z.by||"",(z.foto?fotoName("H"+z.id):"")]);
    if(hrows.length){ if(!silent) toast("Enviando hallazgos ("+hrows.length+")…");
      await drivePost({type:"hallazgo",rows:hrows});
      HZ.forEach(z=>delete z.dirty); sent+=hrows.length; save(); }
    const dses=SES.filter(function(x){return x.dirty;});
    if(dses.length){ const rr=[];
      dses.forEach(function(sx){ (sx.items||[]).forEach(function(it){
        const owners=it.isNew?"—":it.matches.map(function(m){return m.n;}).join(" | ");
        const tarj=it.isNew?"—":it.matches.map(function(m){return m.t;}).join(" | ");
        const sit=it.isNew?"NUEVO (no estaba en sistema)":(it.matches.some(function(m){return m.n!==sx.person;})?"TRASLADO":"CONFIRMADO");
        rr.push([it.iid,it.inv,it.desc||"",owners,tarj,sx.person,sx.emp||"",sx.loc,sit,it.estado||"",it.obs||"",(it.foto?fotoName("A"+it.iid):""),(sx.foto?fotoName("L"+sx.id):""),sx.fecha,sx.by||""]);
      }); });
      if(!silent) toast("Enviando reasignaciones ("+rr.length+")…");
      await drivePost({type:"reasig",rows:rr});
      dses.forEach(function(x){delete x.dirty;}); sent+=rr.length; save(); }
    const fs=(await fotoAll()).filter(x=>!x.sent);
    for(let i=0;i<fs.length;i++){
      if(!silent) toast("Subiendo foto "+(i+1)+" de "+fs.length+"…");
      await drivePost({type:"foto",name:fs[i].name,b64:fs[i].b64});
      fs[i].sent=1; await fotoPut(fs[i]); sent++;
    }
    if(sent>0){ META.lastsync=new Date().toISOString(); save(); }
    updateDot();
    if(!silent) toast("✓ Todo enviado a su Drive");
    else if(sent>0) toast("☁️ Respaldo guardado");
  }catch(e){
    updateDot(); if(!silent) toast("⚠️ Falló el envío: revise conexión/config. Lo pendiente se conserva.");
  }finally{ _pushing=false; }
}

function q(s){ s=(s==null?"":String(s)); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function buildCSV(){
  const head=["No. INVENTARIO","No. TARJETA","¿EXISTE FÍSICAMENTE?","ESTADO FÍSICO","UBICACIÓN FÍSICA REAL","OBSERVACIONES","FECHA VERIF.","VERIFICADO POR"];
  let lines=[head.map(q).join(",")];
  DATA.forEach((it,i)=>{ const s=ST[i]||{};
    lines.push([it.c,it.t,s.x||"",s.s||"",s.u||"",s.o||"",s.f||"",s.by||""].map(q).join(","));
  });
  return "\uFEFF"+lines.join("\r\n");
}
function buildHallCSV(){

  let lines=[head.map(q).join(",")];
  HZ.slice().reverse().forEach((z,ix)=>{
    const obs=(z.obs||"")+(z.foto?((z.obs?" · ":"")+"FOTO: "+fotoName("H"+z.id)):"");

    const sit=it.isNew?"NUEVO (no estaba en sistema)":(it.matches.some(function(m){return m.n!==sx.person;})?"TRASLADO":"CONFIRMADO");

function dl(content, fname, mime){

    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download=fname; document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},1500);
    toast("Archivo generado ✓ (revise Descargas)");

}

function parseCSVLine(line){
  const out=[]; let cur="",qq=false;
  for(let i=0;i<line.length;i++){ const c=line[i];
    if(qq){ if(c==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else qq=false; } else cur+=c; }
    else { if(c===','){out.push(cur);cur="";} else if(c==='"'){qq=true;} else cur+=c; } }
  out.push(cur); return out;
}
function doImport(){
  const txt=document.getElementById("impbox").value.trim();
  if(!txt){ toast("Pegue el contenido primero"); return; }
  const rows=txt.replace(/^\uFEFF/,"").split(/\r?\n/).filter(x=>x.length);
  const idx={}; DATA.forEach((it,i)=>{ idx[it.c+"||"+it.t]=i; });
  let n=0, start=0;
  if(parseCSVLine(rows[0]).join(",").toUpperCase().indexOf("INVENTARIO")>=0) start=1;
  for(let r=start;r<rows.length;r++){
    const f=parseCSVLine(rows[r]); if(f.length<3) continue;
    const i=idx[(f[0]||"").trim()+"||"+(f[1]||"").trim()];
    if(i===undefined) continue;
    const s=ST[i]||(ST[i]={});
    if(f[2])s.x=f[2].trim(); if(f[3])s.s=f[3].trim(); if(f[4])s.u=f[4];
    if(f[5])s.o=f[5]; if(f[6])s.f=f[6].trim(); if(f[7])s.by=f[7].trim();
    if(!s.x&&!s.s&&!s.u&&!s.o) delete ST[i]; else { s.dv=1; n++; }
  }
  save(); refreshProgress(); closeMenu(); goHome();
  toast(n+" bienes cargados ✓");
}

// Ajuste por barra de anuncio de hosts gratis (ej. tiiny.host): sube la barra de botones por encima
function adjustForHostBanner(){
  var extra=0, ids=["fabbar","overlay","sheet","toast","pmodal","camin","view","search"];
  var kids=document.body.children;
  for(var i=0;i<kids.length;i++){ var el=kids[i];
    if(el.id && ids.indexOf(el.id)>=0) continue;
    var tag=el.tagName;
    if(tag==="HEADER"||tag==="SCRIPT"||tag==="STYLE"||tag==="DATALIST"||tag==="INPUT") continue;
    var cs=window.getComputedStyle(el);
    if(cs.position==="fixed"||cs.position==="sticky"){
      var r=el.getBoundingClientRect();
      if(r.height>0 && r.height<260 && r.bottom>=window.innerHeight-3 && r.width>window.innerWidth*0.5){ extra=Math.max(extra,r.height); }
    }
  }
  if(extra===0 && /tiiny\.(site|host)/i.test(location.hostname)) extra=96; // respaldo si no se puede medir
  var fab=document.getElementById("fabbar");
  if(extra>0){ fab.style.bottom=extra+"px"; document.body.style.paddingBottom=(extra+82)+"px"; }
  else { fab.style.bottom="0px"; document.body.style.paddingBottom="84px"; }
}
